# =============================================================================
# SCN TAG VALIDATOR
# =============================================================================
# Enforces FedRAMP 20x Significant Change Notification rules SCN-CSO-EVA and
# SCN-CSO-MAR by reading the SCN-Type tag from either the PR description (on
# pull_request events) or the commit message (on push events). The git history
# is the SCN audit record (SCN-CSO-MAR), and this gate ensures every entry in
# that record carries a recognized SCN-Type categorization.
#
# Categorization defaults to routine-recurring per docs/policies/cm-policy.md
# when no SCN-Type line is present. The validator only fails on a malformed
# SCN-Type value; missing tags are treated as the default. Operators must
# explicitly upgrade the categorization for Adaptive or Transformative changes.
# =============================================================================

name: SCN Tag

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  scn-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Validate SCN-Type tag
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "pull_request" ]; then
            content="${PR_BODY:-}"
            source_label="PR description"
          else
            content="${COMMIT_MSG:-}"
            source_label="commit message"
          fi
          # Extract the SCN-Type line if present. Match optional leading hashes
          # (Markdown heading) and case-insensitive 'SCN-Type:' prefix.
          tag=$(printf '%s\n' "${content}" | grep -iE '^[[:space:]]*##?[[:space:]]*SCN-Type:' | head -n1 | sed -E 's/^[[:space:]]*##?[[:space:]]*SCN-Type:[[:space:]]*//I' | tr -d '[:space:]' || true)
          case "${tag}" in
            adaptive|routine-recurring|transformative)
              echo "SCN-Type: ${tag} (from ${source_label})"
              ;;
            emergency)
              # Emergency-change procedure per CR26 SCN-CSO-EMG. The change itself
              # is permitted to bypass the formal SCN flow; the retroactive
              # documentation is required per the IR runbook.
              echo "::warning::SCN-Type: emergency (from ${source_label}). Emergency-change procedure invoked per SCN-CSO-EMG; retroactive SCN documentation required within 5 business days. See docs/incident-response.md."
              ;;
            "")
              # Per CM policy default: missing tag = routine-recurring. This is the
              # documented default for sole-operator direct pushes; do not fail.
              echo "::notice::No SCN-Type line in ${source_label}; defaulting to routine-recurring per docs/policies/cm-policy.md."
              ;;
            *)
              echo "::error::SCN-Type '${tag}' in ${source_label} is not a recognized value. Must be one of: adaptive | routine-recurring | transformative | emergency. See SCN-CSO-EVA / SCN-CSO-EMG in docs/policies/cm-policy.md."
              exit 1
              ;;
          esac
