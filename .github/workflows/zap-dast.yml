# =============================================================================
# ZAP DAST Scan  (SA-11(8) Dynamic Code Analysis)
# =============================================================================
# Monthly OWASP ZAP baseline scan against the live site, in CI. This mechanizes
# SA-11(8): a dynamic analysis tool runs on a schedule and its findings are
# documented (the ZAP action maintains a tracking issue, which the operator
# triages into docs/poam.md). SAST (Checkov, tfsec) and SCA (Syft, Grype) run on
# every deploy in deploy-with-opa.yml; this adds the dynamic layer.
#
# Phase 1 (here): UNAUTHENTICATED scan of the public/static surface, which
# already satisfies "employ a dynamic analysis tool." Phase 2 (tracked
# follow-up): authenticated coverage of the Basic-Auth-gated taiji application
# via a ZAP context + credentials, for full URL coverage.
# =============================================================================
name: ZAP DAST Scan

on:
  schedule:
    - cron: '23 7 1 * *'   # 07:23 UTC on the 1st of each month
  workflow_dispatch:        # allow on-demand runs

permissions:
  contents: read
  issues: write             # ZAP maintains one tracking issue as the POA&M feed

jobs:
  zap_baseline:
    name: OWASP ZAP Baseline (unauthenticated)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          target: 'https://samaydlette.com'
          cmd_options: '-a'            # include alpha-quality passive rules
          fail_action: false           # informational; findings become POA&M items, not a hard gate
          allow_issue_writing: true
          issue_title: 'ZAP DAST findings (SA-11(8))'
          artifact_name: 'zap-dast-report'
