# =============================================================================
# GitHub Actions Workflow: Deploy Website with OPA Compliance
# =============================================================================
# This workflow stops bad infrastructure from reaching production by checking
# security rules before deployment. If the infrastructure passes security
# checks, it gets deployed. If not, deployment is blocked.
#
# The process: Check security → Deploy if safe → Verify it worked
# =============================================================================

name: Deploy Website with OPA Compliance

# =============================================================================
# WHEN THIS RUNS
# =============================================================================
# Automatically when code changes, during code reviews, or manually
# =============================================================================
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Daily redeploy so the Silk Reeling SCA (Syft + Grype) re-runs against a
    # freshly-pulled Grype vulnerability DB. This gives continuous vulnerability
    # detection (RA-5 / VDR-CSO-DET) for the deployed Python/JS dependency set —
    # catching CVEs newly disclosed against unchanged, already-deployed
    # dependencies, not just at code-change time. ~07:17 UTC daily.
    - cron: '17 7 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'prod'
        type: choice
        options:
        - dev
        - staging
        - prod

# =============================================================================
# GLOBAL SETTINGS
# =============================================================================
# Tool versions and AWS region used everywhere
# =============================================================================
env:
  AWS_REGION: us-east-2
  TERRAFORM_VERSION: 1.5.0
  OPA_VERSION: 0.57.0
  # Published SHA-256 of opa_linux_amd64_static for OPA_VERSION above.
  # Refresh together with OPA_VERSION; source: https://openpolicyagent.org/downloads/v<version>/opa_linux_amd64_static.sha256
  OPA_SHA256: b52c1d58d9c7ffe378d5bda0ab1aeed7eb6a662a466484c92dce0af803a13986
  NODE_VERSION: 22
  # Anchore Syft (SBOM) + Grype (SCA) for the Silk Reeling dependency scan. The
  # tool version and the install.sh fetched to install it are pinned to the same
  # git tag so the toolchain is reproducible. Refresh both together; source:
  # https://github.com/anchore/syft/releases and https://github.com/anchore/grype/releases
  SYFT_VERSION: v1.45.1
  GRYPE_VERSION: v0.114.0

# =============================================================================
# WHAT THIS WORKFLOW CAN DO
# =============================================================================
# Permissions needed to read code, create issues, and upload security results
# =============================================================================
permissions:
  contents: read
  issues: write
  pull-requests: write
  security-events: write

jobs:
  # ===========================================================================
  # JOB 1: SECURITY CHECK
  # ===========================================================================
  # Acts like a security guard - checks if infrastructure is safe before
  # allowing deployment. This is the main protection against bad deployments.
  # ===========================================================================
  compliance-check:
    name: OPA Compliance Check
    runs-on: ubuntu-latest
    outputs:
      compliant: ${{ steps.compliance.outputs.compliant }}

    steps:
    # -------------------------------------------------------------------------
    # GET READY TO CHECK SECURITY
    # -------------------------------------------------------------------------
    # Download code and install the tools needed for security checking
    # -------------------------------------------------------------------------
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    # Install infrastructure management tool
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@633666f66e0061ca3b725c73b2ec20cd13a8fdd1 # v2.0.3
      with:
        terraform_version: ${{ env.TERRAFORM_VERSION }}
        terraform_wrapper: false

    # Install security policy checking tool
    - name: Setup OPA
      run: |
        curl -fL --retry 5 --retry-delay 5 --connect-timeout 10 --max-time 120 \
          -o opa "https://openpolicyagent.org/downloads/v${{ env.OPA_VERSION }}/opa_linux_amd64_static"
        echo "${{ env.OPA_SHA256 }}  opa" | sha256sum -c -
        chmod 755 ./opa
        sudo mv opa /usr/local/bin
        opa version

    # Install JavaScript runtime for Lambda functions
    - name: Setup Node.js
      uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: infrastructure/lambda/package-lock.json

    # Connect to AWS using stored credentials
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # -------------------------------------------------------------------------
    # CREATE CONFIGURATION FILE
    # -------------------------------------------------------------------------
    # Build settings file from stored secrets and variables
    # -------------------------------------------------------------------------
    - name: Create terraform.tfvars
      working-directory: infrastructure
      run: |
        cat > terraform.tfvars << EOF
        domain_name     = "${{ vars.DOMAIN_NAME || 'samaydlette.com' }}"
        aws_region      = "${{ env.AWS_REGION }}"
        environment     = "${{ github.event.inputs.environment || 'prod' }}"
        cost_center     = "${{ vars.COST_CENTER || 'website-ops' }}"
        owner           = "${{ vars.OWNER || 'sam-aydlette' }}"
        existing_ssl_certificate_arn = "${{ secrets.SSL_CERTIFICATE_ARN }}"
        existing_cloudfront_distribution_id = "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"
        existing_s3_bucket_name = "samaydlette.com"
        cloudfront_price_class = "${{ vars.CLOUDFRONT_PRICE_CLASS || 'PriceClass_100' }}"
        manage_dns = ${{ vars.MANAGE_DNS || 'true' }}
        compliance_check_schedule = "${{ vars.COMPLIANCE_SCHEDULE || 'rate(1 day)' }}"
        section_508_compliance_level = "${{ vars.SECTION_508_LEVEL || 'AA' }}"
        EOF

    # -------------------------------------------------------------------------
    # PREPARE MONITORING FUNCTION
    # -------------------------------------------------------------------------
    # Package up the code that will monitor security after deployment
    # -------------------------------------------------------------------------
    - name: Install Lambda dependencies
      working-directory: infrastructure/lambda
      run: npm ci --omit=dev

    # Debug step to see what files exist (helpful for troubleshooting)
    - name: Debug Lambda directory
      working-directory: infrastructure
      run: |
        echo "=== Current directory ==="
        pwd
        echo "=== Infrastructure directory contents ==="
        ls -la
        echo "=== Lambda directory contents ==="
        ls -la lambda/ || echo "❌ Lambda dir missing"
        echo "=== Test zip creation ==="
        cd lambda && zip -r ../test-opa-compliance.zip . && cd ..
        ls -la test-opa-compliance.zip || echo "❌ Test zip failed"
        echo "=== File structure tree ==="
        find . -type f -name "*.js" -o -name "*.json" -o -name "*.rego" | head -10

    # Package monitoring function for deployment. The runtime Lambda evaluates
    # the same Rego policies the deploy gate uses, compiled to Wasm. Compiling
    # here so terraform's source_code_hash sees the same bytes the deploy job
    # will apply.
    - name: Create Lambda zip file
      working-directory: infrastructure
      run: |
        echo "Compiling policies.rego to Wasm for the runtime emitter..."
        opa build -t wasm -e terraform/compliance/compliance_report \
          -o /tmp/opa-bundle.tar.gz policies.rego
        tar -xzf /tmp/opa-bundle.tar.gz -C lambda /policy.wasm
        ls -la lambda/policy.wasm

        echo "Creating Lambda deployment package..."
        cd lambda
        zip -r ../opa-compliance.zip .
        cd ..
        echo "Zip file created:"
        ls -la opa-compliance.zip

    # -------------------------------------------------------------------------
    # CHECK WHAT INFRASTRUCTURE WILL BE BUILT
    # -------------------------------------------------------------------------
    # Look at the infrastructure plan before building anything
    # -------------------------------------------------------------------------
    - name: Terraform Init
      working-directory: infrastructure
      run: terraform init

    - name: Terraform Validate
      working-directory: infrastructure
      run: terraform validate

    # Create a plan showing what will be built
    - name: Terraform Plan
      working-directory: infrastructure
      run: terraform plan -out=tfplan

    # -------------------------------------------------------------------------
    # THE ACTUAL SECURITY CHECK
    # -------------------------------------------------------------------------
    # This is where we check if the planned infrastructure is safe
    # If this fails, nothing gets deployed
    # -------------------------------------------------------------------------
    - name: Run OPA Compliance Check
      working-directory: infrastructure
      id: compliance
      run: |
        chmod +x ../scripts/terraform-plan.sh
        if ../scripts/terraform-plan.sh; then
          echo "compliant=true" >> $GITHUB_OUTPUT
          echo "✅ All compliance checks passed"
        else
          echo "compliant=false" >> $GITHUB_OUTPUT
          echo "❌ Compliance violations found"
          exit 1
        fi

    # -------------------------------------------------------------------------
    # SAVE WORK FOR NEXT STEP
    # -------------------------------------------------------------------------
    # Keep the validated plan and settings for the deployment job
    # -------------------------------------------------------------------------
    - name: Upload Terraform Plan Artifact
      uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
      with:
        name: terraform-plan
        path: |
          infrastructure/tfplan
          infrastructure/tfplan.json
          infrastructure/validations.json
        retention-days: 5

  # ===========================================================================
  # JOB 2: DEPLOY INFRASTRUCTURE
  # ===========================================================================
  # Only runs if security check passed. Builds the infrastructure,
  # uploads the website, and verifies everything works.
  # ===========================================================================
  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
      # id-token: write is required for cosign keyless signing of the KSI
      # signal via the GitHub Actions OIDC provider. Without it, the Sigstore
      # signing step cannot obtain an OIDC token and `cosign sign-blob` fails.
      id-token: write
      # security-events: read lets the GITHUB_TOKEN list this repo's Dependabot
      # alerts (the CVE-bearing SCA findings the VDR builder matches against KEV).
      security-events: read
    needs: [compliance-check, security-scan]
    # IMPORTANT: Only deploy if on main branch AND security check passed
    if: github.ref == 'refs/heads/main' && needs.compliance-check.outputs.compliant == 'true'
    environment: ${{ github.event.inputs.environment || 'prod' }}

    steps:
    # -------------------------------------------------------------------------
    # SET UP SAME ENVIRONMENT AS SECURITY CHECK
    # -------------------------------------------------------------------------
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@633666f66e0061ca3b725c73b2ec20cd13a8fdd1 # v2.0.3
      with:
        terraform_version: ${{ env.TERRAFORM_VERSION }}
        terraform_wrapper: false

    # OPA is required here so the deploy job can compile policies.rego to Wasm
    # for bundling into the Lambda zip. Same version + same SHA pin as the
    # compliance-check job, so the deploy-time gate and the runtime emitter
    # evaluate identical compiled bytes.
    - name: Setup OPA
      run: |
        curl -fL --retry 5 --retry-delay 5 --connect-timeout 10 --max-time 120 \
          -o opa "https://openpolicyagent.org/downloads/v${{ env.OPA_VERSION }}/opa_linux_amd64_static"
        echo "${{ env.OPA_SHA256 }}  opa" | sha256sum -c -
        chmod 755 ./opa
        sudo mv opa /usr/local/bin
        opa version

    - name: Setup Node.js
      uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: infrastructure/lambda/package-lock.json

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # -------------------------------------------------------------------------
    # RE-RENDER tfvars FROM SECRETS (not persisted as an artifact)
    # -------------------------------------------------------------------------
    - name: Create terraform.tfvars
      working-directory: infrastructure
      run: |
        cat > terraform.tfvars << EOF
        domain_name     = "${{ vars.DOMAIN_NAME || 'samaydlette.com' }}"
        aws_region      = "${{ env.AWS_REGION }}"
        environment     = "${{ github.event.inputs.environment || 'prod' }}"
        cost_center     = "${{ vars.COST_CENTER || 'website-ops' }}"
        owner           = "${{ vars.OWNER || 'sam-aydlette' }}"
        existing_ssl_certificate_arn = "${{ secrets.SSL_CERTIFICATE_ARN }}"
        existing_cloudfront_distribution_id = "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"
        existing_s3_bucket_name = "samaydlette.com"
        cloudfront_price_class = "${{ vars.CLOUDFRONT_PRICE_CLASS || 'PriceClass_100' }}"
        manage_dns = ${{ vars.MANAGE_DNS || 'true' }}
        compliance_check_schedule = "${{ vars.COMPLIANCE_SCHEDULE || 'rate(1 day)' }}"
        section_508_compliance_level = "${{ vars.SECTION_508_LEVEL || 'AA' }}"
        create_silk_reeling = true
        silk_reeling_package_path = "./silk-reeling.zip"
        EOF

    - name: Download Terraform Plan Artifact
      uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
      with:
        name: terraform-plan
        path: infrastructure/

    # SAST results from the security-scan job (Checkov SARIF + tfsec JSON).
    # Consumed by the VDR aggregator step further down.
    - name: Download SAST Results Artifact
      uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
      with:
        name: sast-results
        path: infrastructure/

    # -------------------------------------------------------------------------
    # REBUILD MONITORING FUNCTION
    # -------------------------------------------------------------------------
    - name: Install Lambda dependencies
      working-directory: infrastructure/lambda
      run: npm ci --omit=dev

    - name: Create Lambda deployment package
      working-directory: infrastructure
      run: |
        # The runtime Lambda evaluates the same Rego policies the deploy gate
        # uses, compiled to Wasm. One source of truth, one trust chain, no
        # hand-port drift. The Wasm build is byte-stable for a fixed OPA
        # version + policies.rego, so terraform's source_code_hash from the
        # compliance-check job matches the bytes deployed here.
        echo "Compiling policies.rego to Wasm for the runtime emitter..."
        opa build -t wasm -e terraform/compliance/compliance_report \
          -o /tmp/opa-bundle.tar.gz policies.rego
        tar -xzf /tmp/opa-bundle.tar.gz -C lambda /policy.wasm
        ls -la lambda/policy.wasm

        echo "Creating Lambda deployment package..."
        cd lambda
        zip -r ../opa-compliance.zip .
        cd ..
        echo "Lambda package created:"
        ls -la opa-compliance.zip

    - name: Terraform Init
      working-directory: infrastructure
      run: terraform init
    
    # -------------------------------------------------------------------------
    # BUILD THE INFRASTRUCTURE  
    # -------------------------------------------------------------------------
    - name: Import Existing Resources (if needed)
      working-directory: infrastructure
      run: |
        echo "Checking for existing AWS resources to import..."
        
        # Import IAM role if it exists
        if aws iam get-role --role-name "samaydlette-com-lambda-opa-role" >/dev/null 2>&1; then
          echo "IAM role exists in AWS"
          if ! terraform state show aws_iam_role.lambda_opa >/dev/null 2>&1; then
            echo "Importing IAM role..."
            terraform import aws_iam_role.lambda_opa "samaydlette-com-lambda-opa-role"
            echo "✅ IAM role imported"
          else
            echo "IAM role already in Terraform state"
          fi
        else
          echo "No existing IAM role found - will be created"
        fi
        
        # Import IAM role policy if it exists
        if aws iam get-role-policy --role-name "samaydlette-com-lambda-opa-role" --policy-name "samaydlette-com-lambda-opa-policy" >/dev/null 2>&1; then
          echo "IAM role policy exists in AWS"
          if ! terraform state show aws_iam_role_policy.lambda_opa >/dev/null 2>&1; then
            echo "Importing IAM role policy..."
            terraform import aws_iam_role_policy.lambda_opa "samaydlette-com-lambda-opa-role:samaydlette-com-lambda-opa-policy"
            echo "✅ IAM role policy imported"
          else
            echo "IAM role policy already in Terraform state"
          fi
        else
          echo "No existing IAM role policy found - will be created"
        fi
        
        # Import Lambda function if it exists
        if aws lambda get-function --function-name "samaydlette-com-opa-compliance" >/dev/null 2>&1; then
          echo "Lambda function exists in AWS"
          if ! terraform state show 'aws_lambda_function.opa_compliance[0]' >/dev/null 2>&1; then
            echo "Importing Lambda function..."
            terraform import 'aws_lambda_function.opa_compliance[0]' "samaydlette-com-opa-compliance"
            echo "✅ Lambda function imported"
          else
            echo "Lambda function already in Terraform state"
          fi
        else
          echo "No existing Lambda function found - will be created"
        fi
        
        # Import EventBridge rule if it exists
        if aws events describe-rule --name "samaydlette-com-opa-compliance" >/dev/null 2>&1; then
          echo "EventBridge rule exists in AWS"
          if ! terraform state show 'aws_cloudwatch_event_rule.opa_compliance[0]' >/dev/null 2>&1; then
            echo "Importing EventBridge rule..."
            terraform import 'aws_cloudwatch_event_rule.opa_compliance[0]' "samaydlette-com-opa-compliance"
            echo "✅ EventBridge rule imported"
          else
            echo "EventBridge rule already in Terraform state"
          fi
        else
          echo "No existing EventBridge rule found - will be created"
        fi
        
        # Import EventBridge target if it exists (targets are part of the rule, check if targets exist)
        if aws events list-targets-by-rule --rule "samaydlette-com-opa-compliance" --query 'Targets[?Id==`TriggerLambdaTarget`]' --output text >/dev/null 2>&1; then
          echo "EventBridge target exists in AWS"
          if ! terraform state show 'aws_cloudwatch_event_target.lambda[0]' >/dev/null 2>&1; then
            echo "Importing EventBridge target..."
            terraform import 'aws_cloudwatch_event_target.lambda[0]' "samaydlette-com-opa-compliance/TriggerLambdaTarget"
            echo "✅ EventBridge target imported"
          else
            echo "EventBridge target already in Terraform state"
          fi
        else
          echo "No existing EventBridge target found - will be created"
        fi
        
        # Import Lambda permission if it exists
        if aws lambda get-policy --function-name "samaydlette-com-opa-compliance" >/dev/null 2>&1; then
          echo "Lambda function has permissions configured"
          if ! terraform state show 'aws_lambda_permission.allow_eventbridge[0]' >/dev/null 2>&1; then
            echo "Importing Lambda permission..."
            terraform import 'aws_lambda_permission.allow_eventbridge[0]' "samaydlette-com-opa-compliance/AllowExecutionFromEventBridge"
            echo "✅ Lambda permission imported"
          else
            echo "Lambda permission already in Terraform state"
          fi
        else
          echo "No existing Lambda permissions found - will be created"
        fi
    
    # -------------------------------------------------------------------------
    # BUILD THE SILK REELING APP (gated project) — clones silk-reeling-mirror,
    # builds the SPA for the /silk-reeling/ path, and assembles a slim Lambda zip
    # (browser does the ML, so no OpenCV/MediaPipe). Terraform picks up the zip
    # via silk_reeling_package_path (set in tfvars above).
    # -------------------------------------------------------------------------
    - name: Build Silk Reeling app (frontend + slim Lambda zip)
      working-directory: infrastructure
      env:
        SILK_REELING_REF: ${{ vars.SILK_REELING_REF || 'main' }}
        SILK_REELING_REPO_TOKEN: ${{ secrets.SILK_REELING_REPO_TOKEN }}
      run: |
        set -euo pipefail
        rm -rf _silk_src _pkg silk-reeling.zip
        git clone --depth 1 --branch "$SILK_REELING_REF" \
          "https://x-access-token:${SILK_REELING_REPO_TOKEN}@github.com/sam-aydlette/silk-reeling-mirror.git" _silk_src
        ( cd _silk_src/frontend && npm ci && \
          VITE_API_BASE=/silk-reeling npm run build -- --base=/silk-reeling/ )
        mkdir -p _pkg
        # Target the Lambda runtime (python3.13 / manylinux x86_64) explicitly so
        # numpy/pydantic-core C-extension wheels match the runtime ABI regardless
        # of the runner's own Python (which may differ and would otherwise ship
        # cp312 .so files into a cp313 runtime -> Runtime.ImportModuleError).
        python3 -m pip install --quiet --target _pkg \
          --platform manylinux2014_x86_64 --python-version 3.13 \
          --implementation cp --only-binary=:all: \
          -r _silk_src/backend/requirements-lambda.txt
        cp -r _silk_src/backend _pkg/backend
        cp _silk_src/lambda_handler.py _pkg/lambda_handler.py
        cp -r _silk_src/reference_data _pkg/reference_data
        cp -r _silk_src/frontend/dist _pkg/spa
        rm -rf _pkg/backend/__pycache__
        ( cd _pkg && zip -qr ../silk-reeling.zip . )
        echo "silk-reeling.zip size: $(du -h silk-reeling.zip | cut -f1)"

    # -------------------------------------------------------------------------
    # SCAN SILK REELING DEPENDENCIES (Software Composition Analysis) — closes the
    # VDR-CSO-DET gap for the Silk Reeling app. Dependabot watches only this
    # repo's npm/Terraform/Actions manifests; the app's dep manifests live in the
    # separate silk-reeling-mirror repo and reach production via the slim Lambda
    # zip (_pkg) and the SPA bundle. Syft inventories both dependency trees and
    # Grype maps them to CVEs/GHSAs. The VDR aggregator (downstream) is what
    # evaluates and enforces the Class C remediation SLAs, so this step never
    # fails the build on findings — it only has to emit a valid grype.json.
    # Runs unconditionally on the deploy path, mirroring the build step above.
    # -------------------------------------------------------------------------
    - name: Scan Silk Reeling dependencies (Syft SBOM + Grype)
      working-directory: infrastructure
      run: |
        set +e   # SCA findings must never fail the build; the VDR gate does that
        # Install Syft + Grype from the official anchore install.sh, pinned to the
        # same tag as the tool version (mirrors the SHA/version-pinned OPA install).
        curl -sSfL "https://raw.githubusercontent.com/anchore/syft/${SYFT_VERSION}/install.sh" \
          | sh -s -- -b /usr/local/bin "${SYFT_VERSION}"
        curl -sSfL "https://raw.githubusercontent.com/anchore/grype/${GRYPE_VERSION}/install.sh" \
          | sh -s -- -b /usr/local/bin "${GRYPE_VERSION}"
        syft version && grype version
        # Inventory both ecosystems separately: the installed Python deps live in
        # _pkg (the Lambda zip staging dir); the JS resolved tree is in
        # _silk_src/frontend (package-lock.json present after npm ci above).
        # --select-catalogers restricts each scan to the ecosystem we actually
        # ship, so Syft does NOT catalog build-tool native binaries (e.g.
        # esbuild's embedded Go runtime under node_modules), which would
        # otherwise flood the VDR and the inventory with out-of-boundary
        # golang/stdlib findings that are in neither the Lambda nor the browser.
        syft dir:_pkg               -o cyclonedx-json=sbom-python.json --select-catalogers python     || true
        syft dir:_silk_src/frontend -o cyclonedx-json=sbom-js.json     --select-catalogers javascript || true
        # Grype each SBOM. `|| true` so a scan error still leaves a file behind.
        grype sbom:sbom-python.json -o json > grype-python.json || true
        grype sbom:sbom-js.json     -o json > grype-js.json     || true
        # Normalize: any file that is missing/invalid/lacking .matches becomes an
        # empty match set so the merge below cannot fail and ingest_grype always
        # gets a valid top-level .matches[] array.
        for f in grype-python.json grype-js.json; do
          jq -e '.matches' "$f" >/dev/null 2>&1 || echo '{"matches":[]}' > "$f"
        done
        # Merge the two scans into one grype.json (single .matches[] array) that
        # --grype reads. The aggregator is what classifies and gates them.
        jq -s '{matches: (map(.matches) | add)}' grype-python.json grype-js.json > grype.json
        echo "grype.json: $(jq '.matches | length' grype.json) match(es) across Python + JS deps"

    # -------------------------------------------------------------------------
    # IMPORT SILK REELING RESOURCES (if they exist) — local state isn't
    # persisted across runs, so adopt any already-created silk-reeling resources
    # into state before plan/apply (mirrors "Import Existing Resources" above).
    # -------------------------------------------------------------------------
    - name: Import Silk Reeling resources (if needed)
      working-directory: infrastructure
      run: |
        set +e   # handle each guard/import explicitly; a missing resource is fine
        import_silk() {
          if terraform state show "$1" >/dev/null 2>&1; then echo "in state: $1"; return; fi
          echo "importing: $1"; terraform import "$1" "$2" || echo "import skipped: $1"
        }
        KEY_ID=$(aws kms describe-key --key-id alias/samaydlette-com-silk-reeling --query 'KeyMetadata.KeyId' --output text 2>/dev/null || true)
        if [ -n "$KEY_ID" ] && [ "$KEY_ID" != "None" ]; then
          import_silk 'aws_kms_key.silk_reeling[0]' "$KEY_ID"
          import_silk 'aws_kms_alias.silk_reeling[0]' 'alias/samaydlette-com-silk-reeling'
        fi
        aws iam get-role --role-name samaydlette-com-silk-reeling-role >/dev/null 2>&1 && \
          import_silk 'aws_iam_role.silk_reeling[0]' 'samaydlette-com-silk-reeling-role'
        aws iam get-role-policy --role-name samaydlette-com-silk-reeling-role --policy-name samaydlette-com-silk-reeling-policy >/dev/null 2>&1 && \
          import_silk 'aws_iam_role_policy.silk_reeling[0]' 'samaydlette-com-silk-reeling-role:samaydlette-com-silk-reeling-policy'
        aws logs describe-log-groups --log-group-name-prefix /aws/lambda/samaydlette-com-silk-reeling --query 'logGroups[0].logGroupName' --output text 2>/dev/null | grep -q silk-reeling && \
          import_silk 'aws_cloudwatch_log_group.silk_reeling[0]' '/aws/lambda/samaydlette-com-silk-reeling'
        aws secretsmanager describe-secret --secret-id samaydlette-com-silk-reeling-basic-auth >/dev/null 2>&1 && \
          import_silk 'aws_secretsmanager_secret.silk_basic_auth[0]' 'samaydlette-com-silk-reeling-basic-auth'
        aws secretsmanager describe-secret --secret-id samaydlette-com-silk-reeling-anthropic-api-key >/dev/null 2>&1 && \
          import_silk 'aws_secretsmanager_secret.silk_anthropic[0]' 'samaydlette-com-silk-reeling-anthropic-api-key'
        aws lambda get-function --function-name samaydlette-com-silk-reeling >/dev/null 2>&1 && \
          import_silk 'aws_lambda_function.silk_reeling[0]' 'samaydlette-com-silk-reeling'
        # Retire any orphaned Function URL from the pre-API-Gateway deployment —
        # Terraform no longer manages it (the account blocks public access anyway),
        # so delete it to avoid a stray public-NONE endpoint lingering.
        aws lambda get-function-url-config --function-name samaydlette-com-silk-reeling >/dev/null 2>&1 && \
          aws lambda delete-function-url-config --function-name samaydlette-com-silk-reeling 2>/dev/null && \
          echo "deleted orphaned function URL config"
        # API Gateway HTTP API (replaces the Function URL).
        SILK_API_ID=$(aws apigatewayv2 get-apis --query "Items[?Name=='samaydlette-com-silk-reeling'].ApiId | [0]" --output text 2>/dev/null || true)
        if [ -n "$SILK_API_ID" ] && [ "$SILK_API_ID" != "None" ]; then
          import_silk 'aws_apigatewayv2_api.silk_reeling[0]' "$SILK_API_ID"
          SILK_INT_ID=$(aws apigatewayv2 get-integrations --api-id "$SILK_API_ID" --query 'Items[0].IntegrationId' --output text 2>/dev/null || true)
          [ -n "$SILK_INT_ID" ] && [ "$SILK_INT_ID" != "None" ] && \
            import_silk 'aws_apigatewayv2_integration.silk_reeling[0]' "$SILK_API_ID/$SILK_INT_ID"
          SILK_ROUTE_ID=$(aws apigatewayv2 get-routes --api-id "$SILK_API_ID" --query "Items[?RouteKey=='\$default'].RouteId | [0]" --output text 2>/dev/null || true)
          [ -n "$SILK_ROUTE_ID" ] && [ "$SILK_ROUTE_ID" != "None" ] && \
            import_silk 'aws_apigatewayv2_route.silk_reeling[0]' "$SILK_API_ID/$SILK_ROUTE_ID"
          aws apigatewayv2 get-stage --api-id "$SILK_API_ID" --stage-name '$default' >/dev/null 2>&1 && \
            import_silk 'aws_apigatewayv2_stage.silk_reeling[0]' "$SILK_API_ID/\$default"
        fi
        aws lambda get-policy --function-name samaydlette-com-silk-reeling --query 'Policy' --output text 2>/dev/null | grep -q AllowApiGatewayInvoke && \
          import_silk 'aws_lambda_permission.silk_reeling_apigw[0]' 'samaydlette-com-silk-reeling/AllowApiGatewayInvoke'
        echo "Silk Reeling import step complete"

    - name: Generate fresh Terraform plan
      working-directory: infrastructure
      run: terraform plan -out=tfplan

    - name: Terraform Apply
      working-directory: infrastructure
      run: terraform apply -auto-approve tfplan

    # -------------------------------------------------------------------------
    # SEED SILK REELING SECRETS (out-of-band) — set the basic-auth credential and
    # the Anthropic key into Secrets Manager from GitHub secrets, so plaintext
    # never lands in Terraform state. Skips quietly if a secret isn't configured.
    # -------------------------------------------------------------------------
    - name: Seed Silk Reeling secrets
      working-directory: infrastructure
      env:
        SILK_REELING_BASIC_AUTH: ${{ secrets.SILK_REELING_BASIC_AUTH }}
        SILK_REELING_ANTHROPIC_KEY: ${{ secrets.SILK_REELING_ANTHROPIC_KEY }}
      run: |
        set -euo pipefail
        ARNS=$(terraform output -json silk_reeling_secret_arns)
        BASIC_ARN=$(echo "$ARNS" | jq -r '.basic_auth // empty')
        ANTH_ARN=$(echo "$ARNS" | jq -r '.anthropic_key // empty')
        if [ -n "${SILK_REELING_BASIC_AUTH:-}" ] && [ -n "$BASIC_ARN" ]; then
          aws secretsmanager put-secret-value --secret-id "$BASIC_ARN" \
            --secret-string "$SILK_REELING_BASIC_AUTH" >/dev/null
          echo "seeded basic-auth credential"
        fi
        if [ -n "${SILK_REELING_ANTHROPIC_KEY:-}" ] && [ -n "$ANTH_ARN" ]; then
          aws secretsmanager put-secret-value --secret-id "$ANTH_ARN" \
            --secret-string "$SILK_REELING_ANTHROPIC_KEY" >/dev/null
          echo "seeded anthropic key"
        fi

    # -------------------------------------------------------------------------
    # CACHE-BUST WEBSITE ASSETS
    # -------------------------------------------------------------------------
    # Bumps the ?v=<timestamp> query string on every CSS/JS reference in
    # website/**.html so browsers refetch assets rather than serving stale
    # cached copies. Runs in-place; the next step uploads the rewritten files.
    # -------------------------------------------------------------------------
    - name: Cache-bust website assets
      run: node update-cache-version.js

    # -------------------------------------------------------------------------
    # UPLOAD WEBSITE FILES
    # -------------------------------------------------------------------------
    # Put the actual website files on the internet
    # -------------------------------------------------------------------------
    - name: Sync Website Content
      run: |
        echo "Getting S3 bucket name from Terraform outputs..."
        cd infrastructure
        
        BUCKET_NAME=$(terraform output -raw s3_bucket_name 2>/dev/null || echo "")
        
        if [ -z "$BUCKET_NAME" ]; then
          echo "❌ Could not get S3 bucket name from Terraform outputs"
          echo "Available outputs:"
          terraform output 2>/dev/null || echo "No outputs available"
          exit 1
        fi
        
        echo "✅ S3 bucket name: $BUCKET_NAME"
        echo "Syncing website content..."
        
        cd ..
        
        # Upload website files, skip infrastructure code
        aws s3 sync website/ s3://$BUCKET_NAME/ \
          --exclude "*.tf" \
          --exclude "*.tfvars*" \
          --exclude "*.tfstate*" \
          --exclude ".terraform/*" \
          --exclude "infrastructure/*" \
          --exclude "scripts/*" \
          --exclude ".git/*" \
          --exclude "README.md" \
          --exclude "Makefile" \
          --exclude ".gitignore" \
          --exclude ".github/*" \
          --delete
        
        echo "✅ Website content synced successfully"

    # -------------------------------------------------------------------------
    # BUILD AND PUBLISH THE DEPLOY-TIME KSI SIGNAL
    # -------------------------------------------------------------------------
    # The signal joins terraform state, the Lambda's package-lock, the website
    # HTML hashes, the CI provenance from GITHUB_* env vars, and the OPA
    # validations from the compliance-check job into a single signed JSON
    # document at /.well-known/ksi-signal.json. See the research paper at
    # /research/cato-without-the-ato.html for the full rationale.
    # -------------------------------------------------------------------------
    - name: Build deploy-time KSI signal
      working-directory: infrastructure
      env:
        # Tells the emitter to pre-populate provenance.attestation with the
        # sidecar bundle URL before signing. The URL is well-known.
        KSI_SIGN: "1"
      run: |
        echo "Building deploy-time KSI signal..."
        python3 ../scripts/build-ksi-signal.py
        echo "Signal contents (truncated):"
        jq '{signal_id, emitted_at, csp, system_id,
             component_count: (.components | length),
             validation_count: (.validations | length),
             attestation: .provenance.attestation,
             validation_results: [.validations[].result] | group_by(.) | map({(.[0]): length}) | add}' \
          ksi-signal.json

    # -------------------------------------------------------------------------
    # SIGN THE KSI SIGNAL (Sigstore keyless via GitHub OIDC)
    # -------------------------------------------------------------------------
    # Produces a Sigstore bundle (cert + signature + Rekor inclusion proof) as
    # ksi-signal.bundle. Verifiers fetch both files and run:
    #   cosign verify-blob --bundle ksi-signal.bundle \
    #     --certificate-identity 'https://github.com/sam-aydlette/samaydlette.com/.github/workflows/deploy-with-opa.yml@refs/heads/main' \
    #     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
    #     ksi-signal.json
    # -------------------------------------------------------------------------
    - name: Install cosign
      uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

    - name: Sign KSI signal
      working-directory: infrastructure
      run: |
        echo "Signing ksi-signal.json with cosign keyless..."
        cosign sign-blob --yes --bundle ksi-signal.bundle ksi-signal.json
        echo "Bundle written:"
        ls -la ksi-signal.bundle

    - name: Publish KSI signal and bundle to /.well-known/
      working-directory: infrastructure
      run: |
        BUCKET_NAME=$(terraform output -raw s3_bucket_name)
        echo "Publishing to s3://$BUCKET_NAME/.well-known/"
        aws s3 cp ksi-signal.json "s3://$BUCKET_NAME/.well-known/ksi-signal.json" \
          --content-type application/json \
          --cache-control "public, max-age=300"
        aws s3 cp ksi-signal.bundle "s3://$BUCKET_NAME/.well-known/ksi-signal.bundle" \
          --content-type application/json \
          --cache-control "public, max-age=300"
        aws s3 cp schemas/ksi-signal.schema.json "s3://$BUCKET_NAME/.well-known/ksi-signal.schema.json" \
          --content-type application/schema+json \
          --cache-control "public, max-age=3600"
        echo "✅ KSI signal, bundle, and schema published"

    # -------------------------------------------------------------------------
    # BUILD AND PUBLISH THE OSCAL REV 5 SSP
    # -------------------------------------------------------------------------
    # Generates a NIST OSCAL System Security Plan (FedRAMP Rev 5 Moderate
    # baseline shape) from the canonical inventory and the FedRAMP KSI catalog. Sits
    # alongside the KSI signal at /.well-known/oscal-ssp.json.
    # -------------------------------------------------------------------------
    - name: Build OSCAL Rev 5 SSP
      working-directory: infrastructure
      run: |
        echo "Building OSCAL SSP..."
        python3 ../scripts/build-oscal-ssp.py
        echo "SSP summary:"
        jq '{
          uuid: ."system-security-plan".uuid,
          oscal_version: ."system-security-plan".metadata."oscal-version",
          components: (."system-security-plan"."system-implementation".components | length),
          control_count: (."system-security-plan"."control-implementation"."implemented-requirements" | length),
          ksi_signal_id: ."system-security-plan".metadata.props[0].value
        }' oscal-ssp.json

    - name: Sign OSCAL SSP
      working-directory: infrastructure
      run: |
        echo "Signing oscal-ssp.json with cosign keyless..."
        cosign sign-blob --yes --bundle oscal-ssp.bundle oscal-ssp.json

    - name: Publish OSCAL SSP and bundle to /.well-known/
      working-directory: infrastructure
      run: |
        BUCKET_NAME=$(terraform output -raw s3_bucket_name)
        aws s3 cp oscal-ssp.json "s3://$BUCKET_NAME/.well-known/oscal-ssp.json" \
          --content-type application/oscal+json \
          --cache-control "public, max-age=300"
        aws s3 cp oscal-ssp.bundle "s3://$BUCKET_NAME/.well-known/oscal-ssp.bundle" \
          --content-type application/json \
          --cache-control "public, max-age=300"
        echo "✅ OSCAL SSP + bundle published"

    # -------------------------------------------------------------------------
    # BUILD AND PUBLISH THE VDR REPORT (FedRAMP 20x VDR-RPT-PER, VDR-TFR-MHR)
    # -------------------------------------------------------------------------
    # Aggregates SAST/SCA findings (currently OPA gate; Checkov, tfsec, and
    # Dependabot are wired in via optional --flags as those tools are added
    # to the workflow), classifies each per VDR-EVA-* (PAIN N1-N5, IRV, LEV),
    # and emits a Class C-tiered report. The build is the report. If any
    # finding exceeds the Class C tolerance per VDR-TFR-PVR, this step exits
    # non-zero and the build fails — the report becomes the block.
    # -------------------------------------------------------------------------
    # Fetch the previous published VDR report to use as the first-detected
    # ledger; the SLA clock (VDR-TFR-PVR) only ticks if first_detected is
    # preserved across builds. If the live URL is unreachable (first deploy,
    # or transient failure), the script falls back to treating all findings
    # as newly detected — safe default.
    - name: Fetch previous VDR report (first-detected ledger)
      working-directory: infrastructure
      run: |
        if curl -sfL -o previous-vdr-report.json \
            "https://samaydlette.com/.well-known/vdr-report.json"; then
          echo "Previous VDR report fetched ($(wc -c < previous-vdr-report.json) bytes); using as first-detected ledger."
        else
          echo "::warning::Could not fetch previous VDR report; first-detected ledger will be empty (all findings will be treated as newly detected)."
          echo '{"findings":[]}' > previous-vdr-report.json
        fi

    # Fetch this repo's Dependabot alerts — the SCA / CVE-bearing findings the
    # VDR builder cross-references against the CISA KEV catalog. Without these,
    # KEV matching has nothing to act on (IaC scanners emit no CVEs). Non-blocking:
    # if Dependabot is disabled or the token lacks access, fall back to an empty
    # list (ingest_dependabot treats [] as "no SCA findings").
    - name: Fetch Dependabot alerts (SCA / CVE source)
      working-directory: infrastructure
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if gh api -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/dependabot/alerts?state=open&per_page=100" \
            > dependabot-alerts.json 2>/dev/null \
            && jq -e 'type == "array"' dependabot-alerts.json >/dev/null 2>&1; then
          echo "Dependabot alerts fetched: $(jq 'length' dependabot-alerts.json) open ($(jq '[.[] | select(.security_advisory.cve_id != null)] | length' dependabot-alerts.json) with a CVE)."
        else
          echo "::warning::Could not fetch Dependabot alerts (feature disabled or no access); proceeding with an empty SCA set."
          echo '[]' > dependabot-alerts.json
        fi

    # Fetch the live CISA KEV catalog so the VDR builder can flag any finding
    # whose CVE is a Known Exploited Vulnerability (these block the build). If
    # CISA is unreachable (transient), fall back to an empty catalog — ingest_kev
    # treats a missing/empty file as "no KEVs", so the build still completes.
    - name: Fetch CISA KEV catalog
      working-directory: infrastructure
      run: |
        KEV_URL="https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json"
        if curl -sfL --retry 3 --retry-delay 2 -o kev-catalog.json "$KEV_URL" \
            && jq -e '.vulnerabilities | length > 0' kev-catalog.json >/dev/null 2>&1; then
          echo "CISA KEV catalog fetched: version $(jq -r '.catalogVersion' kev-catalog.json), $(jq '.vulnerabilities | length' kev-catalog.json) CVEs."
        else
          echo "::warning::Could not fetch a valid CISA KEV catalog; proceeding with an empty catalog (no KEV flagging this run)."
          echo '{"vulnerabilities":[]}' > kev-catalog.json
        fi

    - name: Build VDR Report (FedRAMP 20x Class C)
      working-directory: infrastructure
      run: |
        echo "Building VDR report..."
        python3 ../scripts/build-vdr-report.py \
          --opa validations.json \
          --checkov checkov-results.sarif \
          --tfsec tfsec-results.json \
          --checkov-yaml ../.checkov.yaml \
          --previous-vdr previous-vdr-report.json \
          --dependabot dependabot-alerts.json \
          --grype grype.json \
          --kev kev-catalog.json \
          --output vdr-report.json
        echo "VDR summary:"
        jq '{summary, rules_reference, risk_accepted_count: (.risk_accepted | length)}' vdr-report.json

    # Append this run's CVE-keyed summary to the rolling vuln trend ledger
    # (RA-5(6)). Fetch the published ledger first so history persists across
    # deploys; the dashboard renders the trend from it.
    - name: Build VDR vuln trend ledger (RA-5(6))
      working-directory: infrastructure
      run: |
        if curl -sfL -o vdr-trend.json "https://samaydlette.com/.well-known/vdr-trend.json"; then
          echo "Previous VDR trend ledger fetched ($(jq '.points | length' vdr-trend.json) points)."
        else
          echo "::warning::No previous VDR trend ledger; starting a fresh one."
          rm -f vdr-trend.json
        fi
        python3 ../scripts/build-vdr-trend.py --report vdr-report.json --trend vdr-trend.json
        cosign sign-blob --yes --bundle vdr-trend.bundle vdr-trend.json

    - name: Sign VDR Report
      working-directory: infrastructure
      run: |
        echo "Signing vdr-report.json with cosign keyless..."
        cosign sign-blob --yes --bundle vdr-report.bundle vdr-report.json

    - name: Publish VDR Report and bundle to /.well-known/
      working-directory: infrastructure
      run: |
        BUCKET_NAME=$(terraform output -raw s3_bucket_name)
        aws s3 cp vdr-report.json "s3://$BUCKET_NAME/.well-known/vdr-report.json" \
          --content-type application/json \
          --cache-control "public, max-age=300"
        aws s3 cp vdr-report.bundle "s3://$BUCKET_NAME/.well-known/vdr-report.bundle" \
          --content-type application/json \
          --cache-control "public, max-age=300"
        aws s3 cp vdr-trend.json "s3://$BUCKET_NAME/.well-known/vdr-trend.json" \
          --content-type application/json \
          --cache-control "public, max-age=300"
        aws s3 cp vdr-trend.bundle "s3://$BUCKET_NAME/.well-known/vdr-trend.bundle" \
          --content-type application/json \
          --cache-control "public, max-age=300"
        echo "✅ VDR report + trend + bundles published"

    # -------------------------------------------------------------------------
    # PROJECT THE CANONICAL INVENTORY INTO FEDRAMP IIW (APPENDIX M) SHAPE
    # -------------------------------------------------------------------------
    # The IIW is the third report this codebase derives from one source. The
    # KSI signal is the wire format, the OSCAL SSP is the Rev 5 view, and the
    # IIW is the Excel-compatible shape FedRAMP processes still ask for. All
    # three derive from the canonical inventory in ksi-signal.json.
    # -------------------------------------------------------------------------
    - name: Build IIW (FedRAMP SSP Appendix M)
      working-directory: infrastructure
      run: |
        echo "Projecting KSI signal into IIW shape..."
        python3 ../scripts/build-iiw.py \
          --signal ksi-signal.json \
          --output iiw.csv
        echo "IIW row count: $(($(wc -l < iiw.csv) - 1))"

    - name: Sign IIW CSV
      working-directory: infrastructure
      run: |
        echo "Signing iiw.csv with cosign keyless..."
        cosign sign-blob --yes --bundle iiw.bundle iiw.csv

    - name: Publish IIW and bundle to /.well-known/
      working-directory: infrastructure
      run: |
        BUCKET_NAME=$(terraform output -raw s3_bucket_name)
        aws s3 cp iiw.csv "s3://$BUCKET_NAME/.well-known/iiw.csv" \
          --content-type text/csv \
          --cache-control "public, max-age=300"
        aws s3 cp iiw.bundle "s3://$BUCKET_NAME/.well-known/iiw.bundle" \
          --content-type application/json \
          --cache-control "public, max-age=300"
        echo "✅ IIW + bundle published"

    # -------------------------------------------------------------------------
    # BUILD AND PUBLISH THE OSCAL POA&M
    # -------------------------------------------------------------------------
    # NIST OSCAL Plan of Action and Milestones format. Imports the OSCAL SSP
    # at /.well-known/oscal-ssp.json so a consumer can navigate from a poam
    # item to the system component it concerns. Fields align with FedRAMP
    # Rev 5 Appendix O via FedRAMP-namespaced props.
    # -------------------------------------------------------------------------
    - name: Build OSCAL POA&M
      working-directory: infrastructure
      run: |
        echo "Building OSCAL POA&M..."
        python3 ../scripts/build-oscal-poam.py \
          --ksi-signal ksi-signal.json \
          --output oscal-poam.json
        echo "POA&M items:"
        jq '.["plan-of-action-and-milestones"]["poam-items"] | length' oscal-poam.json

    - name: Sign OSCAL POA&M
      working-directory: infrastructure
      run: |
        echo "Signing oscal-poam.json with cosign keyless..."
        cosign sign-blob --yes --bundle oscal-poam.bundle oscal-poam.json

    - name: Publish OSCAL POA&M and bundle to /.well-known/
      working-directory: infrastructure
      run: |
        BUCKET_NAME=$(terraform output -raw s3_bucket_name)
        aws s3 cp oscal-poam.json "s3://$BUCKET_NAME/.well-known/oscal-poam.json" \
          --content-type application/oscal+json \
          --cache-control "public, max-age=300"
        aws s3 cp oscal-poam.bundle "s3://$BUCKET_NAME/.well-known/oscal-poam.bundle" \
          --content-type application/json \
          --cache-control "public, max-age=300"
        echo "✅ OSCAL POA&M + bundle published"

    # -------------------------------------------------------------------------
    # REFRESH WEBSITE CACHE
    # -------------------------------------------------------------------------
    # Tell the CDN to show the new website immediately
    # -------------------------------------------------------------------------
    - name: Invalidate CloudFront Cache
      run: |
        echo "Getting CloudFront distribution ID..."
        cd infrastructure
        
        DISTRIBUTION_ID=$(terraform output -raw cloudfront_distribution_id 2>/dev/null || echo "")
        
        if [ -z "$DISTRIBUTION_ID" ]; then
          echo "❌ Could not get CloudFront distribution ID"
          echo "Available outputs:"
          terraform output 2>/dev/null || echo "No outputs available"
          exit 1
        fi
        
        echo "✅ CloudFront distribution ID: $DISTRIBUTION_ID"
        echo "Creating cache invalidation..."
        
        # Tell CDN to refresh all cached content
        aws cloudfront create-invalidation \
          --distribution-id $DISTRIBUTION_ID \
          --paths "/*"
        
        echo "✅ CloudFront cache invalidation created"

    # -------------------------------------------------------------------------
    # VERIFY EVERYTHING WORKED
    # -------------------------------------------------------------------------
    # Run the monitoring function to make sure deployment was successful
    # -------------------------------------------------------------------------
    - name: Run Post-Deployment Compliance Check
      run: |
        echo "Debug: Current working directory"
        pwd
        echo "Debug: Directory contents before Lambda check"
        ls -la
        
        cd infrastructure
        
        LAMBDA_FUNCTION=$(terraform output -raw lambda_function_name 2>/dev/null || echo "")
        echo "Lambda function name: $LAMBDA_FUNCTION"
        
        cd ..
        
        # Test the monitoring function if it exists
        if [ -n "$LAMBDA_FUNCTION" ] && [ "$LAMBDA_FUNCTION" != "Not created" ]; then
          if aws lambda get-function --function-name $LAMBDA_FUNCTION >/dev/null 2>&1; then
            echo "✅ Lambda function exists, invoking..."
            aws lambda invoke \
              --function-name $LAMBDA_FUNCTION \
              --payload '{}' \
              compliance-result.json
            
            echo "Debug: Directory contents after Lambda invoke"
            ls -la
            
            if [ -f compliance-result.json ]; then
              echo "✅ compliance-result.json created successfully"
              echo "Compliance check results:"
              cat compliance-result.json | jq '.'
              
              COMPLIANT=$(cat compliance-result.json | jq -r '.body' | jq -r '.compliant // false')
              if [ "$COMPLIANT" = "true" ]; then
                echo "✅ Post-deployment compliance check passed"
              else
                echo "❌ Post-deployment compliance violations found"
                echo "::warning::Compliance violations detected in deployed infrastructure"
              fi
            else
              echo "❌ compliance-result.json was not created by Lambda invoke"
              echo '{"message":"Lambda invoke failed to create file","compliant":false}' > compliance-result.json
            fi
          else
            echo "⚠️ Lambda function not found in AWS, creating placeholder compliance result"
            echo '{"message":"Lambda function not found in AWS","compliant":true}' > compliance-result.json
          fi
        else
          echo "⚠️ Lambda function not available during initial deployment"
          echo '{"message":"Lambda function not available during initial deployment","compliant":true}' > compliance-result.json
        fi
        
        echo "Debug: Final directory contents"
        ls -la
        echo "Debug: Checking if compliance-result.json exists"
        if [ -f compliance-result.json ]; then
          echo "✅ compliance-result.json exists"
          cat compliance-result.json
        else
          echo "❌ compliance-result.json still missing"
        fi
  
    # Help debug file system issues
    - name: Debug - List files before upload
      if: always()
      run: |
        echo "Pre-upload debug:"
        pwd
        ls -la
        find . -name "*compliance*" -type f 2>/dev/null || echo "No compliance files found anywhere"
    
    # -------------------------------------------------------------------------
    # SAVE DEPLOYMENT SUMMARY
    # -------------------------------------------------------------------------
    - name: Save Deployment Outputs
      run: |
        cd infrastructure
        terraform output -json > ../deployment-outputs.json
        cd ..
        echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "| Output | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
        cd infrastructure
        echo "| S3 Bucket | $(terraform output -raw s3_bucket_name) |" >> $GITHUB_STEP_SUMMARY
        echo "| CloudFront Distribution | $(terraform output -raw cloudfront_distribution_id) |" >> $GITHUB_STEP_SUMMARY
        echo "| Website URL | $(terraform output -json website_urls | jq -r '.domain // .cloudfront') |" >> $GITHUB_STEP_SUMMARY
    
    # Keep compliance results for audit records
    - name: Upload Compliance Report
      uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
      if: always()
      with:
        name: compliance-report
        path: |
          compliance-result.json
          infrastructure/ksi-signal.json
          infrastructure/ksi-signal.bundle
          infrastructure/oscal-ssp.json
        retention-days: 30

  # ===========================================================================
  # JOB 3: EXTRA SECURITY SCANS
  # ===========================================================================
  # Runs additional security tools during code review to catch more issues
  # ===========================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    # Runs on both push and pull_request so the deploy job (which only runs on
    # push to main) can consume the SARIF output as a workflow artifact and
    # feed it to the VDR aggregator.

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    # Scan infrastructure code for security issues
    - name: Run tfsec
      uses: aquasecurity/tfsec-action@b466648d6e39e7c75324f25d83891162a721f2d6 # v1.0.3
      with:
        # Authenticate the action's "resolve latest tfsec release" GitHub API
        # call — anonymous requests get rate-limited on shared runners and the
        # step then dies with "jq: Cannot iterate over null" before scanning.
        github_token: ${{ secrets.GITHUB_TOKEN }}
        soft_fail: true
        additional_args: --format json --out tfsec-results.json

    # Another security scanner with different focus.
    # Newer versions of bridgecrewio/checkov-action treat output_file_path
    # as a directory and write the SARIF inside it (e.g. results/results_sarif.sarif).
    # We point it at a directory and locate the SARIF afterwards.
    - name: Run Checkov
      id: checkov
      uses: bridgecrewio/checkov-action@63fbdab56e22a18bbc16fdc5208c0d30a71f3a24 # v12.2937.0
      with:
        directory: .
        framework: terraform
        soft_fail: true
        output_format: sarif
        output_file_path: checkov-out

    # Locate the SARIF file Checkov produced and copy it to a predictable path.
    # Fall back to a minimal empty SARIF if the action produced nothing.
    - name: Locate or create SARIF and tfsec files
      if: always()
      run: |
        SARIF_FOUND=$(find checkov-out -name "*.sarif" -type f 2>/dev/null | head -n1 || true)
        if [ -n "$SARIF_FOUND" ]; then
          cp "$SARIF_FOUND" checkov-results.sarif
          echo "Located Checkov SARIF at $SARIF_FOUND, copied to checkov-results.sarif ($(wc -c < checkov-results.sarif) bytes)"
        else
          echo "No SARIF produced by Checkov; creating empty fallback..."
          cat > checkov-results.sarif << 'EOF'
        {
          "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
          "version": "2.1.0",
          "runs": [
            {
              "tool": {
                "driver": {
                  "name": "Checkov",
                  "version": "fallback"
                }
              },
              "results": []
            }
          ]
        }
        EOF
        fi
        if [ ! -f tfsec-results.json ]; then
          echo "Creating fallback tfsec JSON file..."
          echo '{"results": []}' > tfsec-results.json
        else
          echo "tfsec JSON size: $(wc -c < tfsec-results.json) bytes"
        fi

    # Upload results to GitHub Security tab
    - name: Upload Checkov Results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@662472033e021d55d94146f66f6058822b0b39fd # v3.27.0
      if: always()
      with:
        sarif_file: checkov-results.sarif

    # Share the SAST output with the deploy job so it can be ingested by the
    # VDR aggregator. The deploy job runs on push to main; the artifact is the
    # transport between the two jobs.
    - name: Upload SAST artifacts for VDR aggregation
      uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
      if: always()
      with:
        name: sast-results
        path: |
          checkov-results.sarif
          tfsec-results.json
        retention-days: 5

  # ===========================================================================
  # JOB 4: ALERT WHEN THINGS BREAK
  # ===========================================================================
  # Sends notifications and creates tickets when deployment fails
  # ===========================================================================
  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [compliance-check, deploy]
    if: always() && (needs.compliance-check.result == 'failure' || needs.deploy.result == 'failure')
    
    steps:
    # Create GitHub issue so failure doesn't get forgotten
    - name: Create Issue on Failure
      if: github.event_name == 'push'
      uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `Deployment Failed: ${context.workflow}`,
            body: `## Deployment Failure Report
            
            **Workflow**: ${context.workflow}
            **Run ID**: ${context.runId}
            **Commit**: ${context.sha}
            **Branch**: ${context.ref}
            
            The deployment failed during the compliance check or deployment phase.
            Please review the workflow logs and compliance reports.
            
            [View Workflow Run](${context.payload.repository.html_url}/actions/runs/${context.runId})`,
            labels: ['deployment', 'failure', 'urgent']
          })
