# =============================================================================
# GitHub Actions Workflow: Deploy Website with OPA Compliance
# =============================================================================
# This workflow stops bad infrastructure from reaching production by checking
# security rules before deployment. If the infrastructure passes security
# checks, it gets deployed. If not, deployment is blocked.
#
# The process: Check security → Deploy if safe → Verify it worked
# =============================================================================

name: Deploy Website with OPA Compliance

# =============================================================================
# WHEN THIS RUNS
# =============================================================================
# Automatically when code changes, during code reviews, or manually
# =============================================================================
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Daily redeploy so the Silk Reeling SCA (Syft + Grype) re-runs against a
    # freshly-pulled Grype vulnerability DB. This gives continuous vulnerability
    # detection (RA-5 / VDR-CSO-DET) for the deployed Python/JS dependency set —
    # catching CVEs newly disclosed against unchanged, already-deployed
    # dependencies, not just at code-change time. ~07:17 UTC daily.
    - cron: '17 7 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'prod'
        type: choice
        options:
        - dev
        - staging
        - prod

# =============================================================================
# CONCURRENCY — serialize deploys so overlapping runs never race terraform apply
# =============================================================================
# This repo keeps NO remote Terraform state; each run rebuilds state by importing
# live resources before apply. Two deploys running at once therefore apply
# against the same AWS account from independent states and thrash ephemeral-state
# resources — most visibly the Cognito app client, whose server-generated id is
# baked into the SPA at build time: concurrent applies recreate the client, its
# id changes, and the deployed SPA is left pointing at a dead client_id (the
# Hosted-UI "an error was encountered with the requested page" failure).
# Serialize the deploy path to one run at a time, keyed by ref. Never cancel a
# run mid-apply — a partial terraform apply is worse than a queue — so the
# in-flight run finishes and the newest queued run goes next.
# =============================================================================
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# =============================================================================
# GLOBAL SETTINGS
# =============================================================================
# Tool versions and AWS region used everywhere
# =============================================================================
env:
  AWS_REGION: us-east-2
  # Gate for publishing the research paper "Shift Left on Reciprocity"
  # (/research/the-plumbing.html + its Sigstore bundle). When "true" the deploy
  # syncs, signs, and serves the paper. Set "false" to hold it back during a
  # revision (the draft stays in the repo either way).
  PUBLISH_PLUMBING_PAPER: "true"
  # The per-deploy stack now persists state in S3 (Task 16), so resources no
  # longer need re-importing every run. The import steps are skipped by default
  # and kept only as a disaster-recovery path: set REBUILD_STATE=true to
  # re-adopt every live resource into a fresh/empty state.
  REBUILD_STATE: "false"
  TERRAFORM_VERSION: 1.5.0
  OPA_VERSION: 1.18.2
  REGAL_VERSION: 0.41.1
  # Published SHA-256 of opa_linux_amd64_static for OPA_VERSION above.
  # Refresh together with OPA_VERSION; source: https://openpolicyagent.org/downloads/v<version>/opa_linux_amd64_static.sha256
  OPA_SHA256: 9903e5125ac281104f2c4b7371d10cc3b74a98933743fcbfc174f9bf0ab20de8
  # Published SHA-256 of regal_Linux_x86_64 for REGAL_VERSION above. Refresh
  # together; source: the release's checksums.txt on github.com/open-policy-agent/regal
  REGAL_SHA256: 6769dcd8e88bc5ba5ff4fac500e4a99d55b3eec3d1d0842833d84f6820a2a80f
  NODE_VERSION: 22
  # Anchore Syft (SBOM) + Grype (SCA) for the Silk Reeling dependency scan. The
  # tool version and the install.sh fetched to install it are pinned to the same
  # git tag so the toolchain is reproducible. Refresh both together; source:
  # https://github.com/anchore/syft/releases and https://github.com/anchore/grype/releases
  SYFT_VERSION: v1.45.1
  GRYPE_VERSION: v0.114.0

# =============================================================================
# WHAT THIS WORKFLOW CAN DO
# =============================================================================
# Permissions needed to read code, create issues, and upload security results
# =============================================================================
permissions:
  contents: read
  issues: write
  pull-requests: write
  security-events: write
  id-token: write   # assume the deploy role via GitHub OIDC (POAM-001)

jobs:
  # ===========================================================================
  # JOB 0: TEST GATE
  # ===========================================================================
  # Runs the Python unit suite and the OPA policy tests on every push and PR.
  # Needs no AWS credentials, so it gates pull requests cleanly and fast, and
  # the deploy job depends on it — a red test cannot ship. This is the safety
  # net that was written but never wired in.
  # ===========================================================================
  test:
    name: Unit tests (pytest + opa test)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Install test dependencies
      run: python3 -m pip install --user pytest jsonschema pyyaml 'ruff==0.15.20' 'mypy==2.1.0'

    - name: Setup OPA
      run: |
        curl -fL --retry 5 --retry-delay 5 --connect-timeout 10 --max-time 120 \
          -o opa "https://openpolicyagent.org/downloads/v${{ env.OPA_VERSION }}/opa_linux_amd64_static"
        echo "${{ env.OPA_SHA256 }}  opa" | sha256sum -c -
        chmod 755 ./opa
        sudo mv opa /usr/local/bin

    - name: Python unit tests
      run: python3 -m pytest tests/ -q

    # The policy suite is an exhibit: format is enforced, strict compilation
    # with the input schema is enforced, coverage has a floor, and every eval
    # path uses --strict-builtin-errors so a broken builtin (the class of bug
    # that silently killed the old alt-text rule) fails loudly instead of
    # evaluating to undefined.
    - name: OPA policy checks (fmt, strict check, tests + coverage)
      run: |
        opa fmt --fail --list infrastructure/policy/
        opa check --strict --schema infrastructure/schemas/policy-input infrastructure/policy
        opa test --coverage --threshold 90 infrastructure/policy/ > /dev/null
        opa test infrastructure/policy/
        opa test policies/triage.rego policies/triage_test.rego

    - name: Regal lint (Rego linter, pinned)
      run: |
        curl -L --fail --retry 3 -o regal \
          "https://github.com/open-policy-agent/regal/releases/download/v${REGAL_VERSION}/regal_Linux_x86_64"
        echo "${REGAL_SHA256}  regal" | sha256sum -c -
        chmod +x regal
        ./regal lint --format github infrastructure/policy

    # Control lineage has one source of truth: each rule's METADATA is diffed
    # against the KSI catalog, so a rule cannot claim a NIST control its
    # declared KSIs do not carry.
    - name: Policy annotation ↔ KSI catalog diff
      run: python3 scripts/check-policy-annotations.py

    # Exceptions-as-code hygiene: an expired exception no longer suppresses at
    # eval time AND fails the build here, so the register cannot rot.
    - name: Exception register expiry check
      run: python3 scripts/check-exceptions.py

    # Real-bug lint (pyflakes + bugbear, not cosmetic style) and lenient type
    # check. Config in pyproject.toml. Catches the class of latent bug the panel
    # review flagged (e.g. the unhashable-dict crash) before it reaches a deploy.
    - name: Ruff lint (scripts + tests)
      run: python3 -m ruff check scripts/ tests/

    - name: mypy type check (scripts)
      run: python3 -m mypy scripts/

  # ===========================================================================
  # JOB 1: SECURITY CHECK
  # ===========================================================================
  # Acts like a security guard - checks if infrastructure is safe before
  # allowing deployment. This is the main protection against bad deployments.
  # ===========================================================================
  compliance-check:
    name: OPA Compliance Check
    runs-on: ubuntu-latest
    # Cap the job so a stuck step (notably the intermittent OIDC/STS credential
    # hang) fails in minutes instead of GitHub's 6-hour default.
    timeout-minutes: 25
    outputs:
      compliant: ${{ steps.compliance.outputs.compliant }}

    steps:
    # -------------------------------------------------------------------------
    # GET READY TO CHECK SECURITY
    # -------------------------------------------------------------------------
    # Download code and install the tools needed for security checking
    # -------------------------------------------------------------------------
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    # Install infrastructure management tool
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
      with:
        terraform_version: ${{ env.TERRAFORM_VERSION }}
        terraform_wrapper: false

    # Install security policy checking tool
    - name: Setup OPA
      run: |
        curl -fL --retry 5 --retry-delay 5 --connect-timeout 10 --max-time 120 \
          -o opa "https://openpolicyagent.org/downloads/v${{ env.OPA_VERSION }}/opa_linux_amd64_static"
        echo "${{ env.OPA_SHA256 }}  opa" | sha256sum -c -
        chmod 755 ./opa
        sudo mv opa /usr/local/bin
        opa version

    # Install JavaScript runtime for Lambda functions
    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: infrastructure/lambda/package-lock.json

    # Connect to AWS using stored credentials
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
      # The OIDC AssumeRoleWithWebIdentity call to regional STS intermittently
      # times out from GitHub runners. retry-max-attempts rides through a brief
      # blip; timeout-minutes caps a real outage at a quick, re-runnable failure
      # instead of hanging on GitHub's 6-hour default.
      timeout-minutes: 6
      with:
        # GitHub OIDC role assumption — no long-lived access key (POAM-001).
        # Role ARN is a repo variable so the account ID stays out of the YAML.
        role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}
        retry-max-attempts: 5

    # -------------------------------------------------------------------------
    # CREATE CONFIGURATION FILE
    # -------------------------------------------------------------------------
    # Build settings file from stored secrets and variables
    # -------------------------------------------------------------------------
    - name: Create terraform.tfvars
      working-directory: infrastructure
      run: |
        cat > terraform.tfvars << EOF
        domain_name     = "${{ vars.DOMAIN_NAME || 'samaydlette.com' }}"
        aws_region      = "${{ env.AWS_REGION }}"
        environment     = "${{ github.event.inputs.environment || 'prod' }}"
        cost_center     = "${{ vars.COST_CENTER || 'website-ops' }}"
        owner           = "${{ vars.OWNER || 'sam-aydlette' }}"
        existing_ssl_certificate_arn = "${{ secrets.SSL_CERTIFICATE_ARN }}"
        existing_cloudfront_distribution_id = "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"
        existing_s3_bucket_name = "samaydlette.com"
        cloudfront_price_class = "${{ vars.CLOUDFRONT_PRICE_CLASS || 'PriceClass_100' }}"
        manage_dns = ${{ vars.MANAGE_DNS || 'true' }}
        compliance_check_schedule = "${{ vars.COMPLIANCE_SCHEDULE || 'rate(1 day)' }}"
        section_508_compliance_level = "${{ vars.SECTION_508_LEVEL || 'AA' }}"
        EOF

    # -------------------------------------------------------------------------
    # PREPARE MONITORING FUNCTION
    # -------------------------------------------------------------------------
    # Package up the code that will monitor security after deployment
    # -------------------------------------------------------------------------
    - name: Install Lambda dependencies
      working-directory: infrastructure/lambda
      run: npm ci --omit=dev

    # Debug step to see what files exist (helpful for troubleshooting)
    - name: Debug Lambda directory
      working-directory: infrastructure
      run: |
        echo "=== Current directory ==="
        pwd
        echo "=== Infrastructure directory contents ==="
        ls -la
        echo "=== Lambda directory contents ==="
        ls -la lambda/ || echo "❌ Lambda dir missing"
        echo "=== Test zip creation ==="
        cd lambda && zip -r ../test-opa-compliance.zip . && cd ..
        ls -la test-opa-compliance.zip || echo "❌ Test zip failed"
        echo "=== File structure tree ==="
        find . -type f -name "*.js" -o -name "*.json" -o -name "*.rego" | head -10

    # Package monitoring function for deployment. The runtime Lambda evaluates
    # the same Rego policies the deploy gate uses, compiled to Wasm. Compiling
    # here so terraform's source_code_hash sees the same bytes the deploy job
    # will apply.
    - name: Create Lambda zip file
      working-directory: infrastructure
      run: |
        echo "Compiling the policy packages to Wasm for the runtime emitter..."
        opa build -t wasm -e terraform/compliance/compliance_report \
          -o /tmp/opa-bundle.tar.gz policy/
        tar -xzf /tmp/opa-bundle.tar.gz -C lambda /policy.wasm
        # Parameters-as-data: the bundle's data document (built from
        # infrastructure/policy/config/data.json) ships alongside the wasm;
        # the Lambda loads it via setData at cold start.
        tar -xzOf /tmp/opa-bundle.tar.gz /data.json > lambda/policy-data.json
        ls -la lambda/policy.wasm lambda/policy-data.json

        echo "Creating Lambda deployment package..."
        cd lambda
        zip -r ../opa-compliance.zip .
        cd ..
        echo "Zip file created:"
        ls -la opa-compliance.zip

    # One artifact, two enforcement points: prove the CLI evaluation (deploy
    # gate) and the Wasm evaluation (the runtime Lambda's opa-wasm host)
    # agree on the full fixture corpus before this exact wasm ships. Wasm
    # builtins are partly implemented by the JS host, so agreement is a test
    # result, not a given (a %v-formatted set already diverged once).
    - name: Policy parity test (CLI vs Wasm)
      run: |
        NODE_PATH=infrastructure/lambda/node_modules node scripts/policy-parity-test.js \
          --wasm infrastructure/lambda/policy.wasm \
          --data infrastructure/lambda/policy-data.json

    # -------------------------------------------------------------------------
    # CHECK WHAT INFRASTRUCTURE WILL BE BUILT
    # -------------------------------------------------------------------------
    # Look at the infrastructure plan before building anything
    # -------------------------------------------------------------------------
    - name: Terraform Init
      working-directory: infrastructure
      run: terraform init -input=false

    - name: Terraform Validate
      working-directory: infrastructure
      run: terraform validate

    # Create a plan showing what will be built. The state lock is shared with
    # every other run's plan; the workflow-level concurrency group only
    # serializes runs on the SAME ref, so plans from different open PRs can
    # race for the lock. -lock-timeout makes a contending plan wait its turn
    # instead of failing the check.
    - name: Terraform Plan
      working-directory: infrastructure
      run: terraform plan -lock-timeout=300s -out=tfplan

    # -------------------------------------------------------------------------
    # THE ACTUAL SECURITY CHECK
    # The accessibility scanner (pa11y) renders pages in the runner's system
    # Chrome; PUPPETEER_SKIP_DOWNLOAD avoids fetching a duplicate browser.
    # terraform-plan.sh fails closed if this install is missing.
    - name: Install accessibility scanner
      working-directory: tools/a11y
      env:
        PUPPETEER_SKIP_DOWNLOAD: "1"
      # --ignore-scripts: no dependency lifecycle script runs in this
      # credentialed job; puppeteer's browser download is skipped anyway
      # (the scan uses the runner's system Chrome).
      run: npm ci --no-audit --no-fund --ignore-scripts

    # -------------------------------------------------------------------------
    # This is where we check if the planned infrastructure is safe
    # If this fails, nothing gets deployed
    # -------------------------------------------------------------------------
    - name: Run OPA Compliance Check
      working-directory: infrastructure
      id: compliance
      run: |
        chmod +x ../scripts/terraform-plan.sh
        if ../scripts/terraform-plan.sh; then
          echo "compliant=true" >> $GITHUB_OUTPUT
          echo "✅ All compliance checks passed"
        else
          echo "compliant=false" >> $GITHUB_OUTPUT
          echo "❌ Compliance violations found"
          exit 1
        fi

    # -------------------------------------------------------------------------
    # SAVE WORK FOR NEXT STEP
    # -------------------------------------------------------------------------
    # Keep the validated plan and settings for the deployment job
    # -------------------------------------------------------------------------
    - name: Upload Terraform Plan Artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: terraform-plan
        path: |
          infrastructure/tfplan
          infrastructure/tfplan.json
          infrastructure/validations.json
        retention-days: 5

  # ===========================================================================
  # JOB 2: DEPLOY INFRASTRUCTURE
  # ===========================================================================
  # Only runs if security check passed. Builds the infrastructure,
  # uploads the website, and verifies everything works.
  # ===========================================================================
  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    # Cap the job so a stuck step (notably the intermittent OIDC/STS credential
    # hang) fails in minutes instead of GitHub's 6-hour default.
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
      pull-requests: write
      # id-token: write is required for cosign keyless signing of the KSI
      # signal via the GitHub Actions OIDC provider. Without it, the Sigstore
      # signing step cannot obtain an OIDC token and `cosign sign-blob` fails.
      id-token: write
      # security-events: read lets the GITHUB_TOKEN list this repo's Dependabot
      # alerts (the CVE-bearing SCA findings the VDR builder matches against KEV).
      security-events: read
    needs: [test, compliance-check, security-scan]
    # IMPORTANT: Only deploy if on main branch AND security check passed
    if: github.ref == 'refs/heads/main' && needs.compliance-check.outputs.compliant == 'true'
    environment: ${{ github.event.inputs.environment || 'prod' }}

    steps:
    # -------------------------------------------------------------------------
    # SET UP SAME ENVIRONMENT AS SECURITY CHECK
    # -------------------------------------------------------------------------
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
      with:
        terraform_version: ${{ env.TERRAFORM_VERSION }}
        terraform_wrapper: false

    # OPA is required here so the deploy job can compile the policy packages to Wasm
    # for bundling into the Lambda zip. Same version + same SHA pin as the
    # compliance-check job, so the deploy-time gate and the runtime emitter
    # evaluate identical compiled bytes.
    - name: Setup OPA
      run: |
        curl -fL --retry 5 --retry-delay 5 --connect-timeout 10 --max-time 120 \
          -o opa "https://openpolicyagent.org/downloads/v${{ env.OPA_VERSION }}/opa_linux_amd64_static"
        echo "${{ env.OPA_SHA256 }}  opa" | sha256sum -c -
        chmod 755 ./opa
        sudo mv opa /usr/local/bin
        opa version

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: infrastructure/lambda/package-lock.json

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
      # See the compliance-check job: cap the intermittent OIDC/STS hang and
      # retry the assume-role call to ride through a brief blip.
      timeout-minutes: 6
      with:
        # GitHub OIDC role assumption — no long-lived access key (POAM-001).
        # Role ARN is a repo variable so the account ID stays out of the YAML.
        role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}
        retry-max-attempts: 5

    # -------------------------------------------------------------------------
    # RE-RENDER tfvars FROM SECRETS (not persisted as an artifact)
    # -------------------------------------------------------------------------
    - name: Create terraform.tfvars
      working-directory: infrastructure
      run: |
        cat > terraform.tfvars << EOF
        domain_name     = "${{ vars.DOMAIN_NAME || 'samaydlette.com' }}"
        aws_region      = "${{ env.AWS_REGION }}"
        environment     = "${{ github.event.inputs.environment || 'prod' }}"
        cost_center     = "${{ vars.COST_CENTER || 'website-ops' }}"
        owner           = "${{ vars.OWNER || 'sam-aydlette' }}"
        existing_ssl_certificate_arn = "${{ secrets.SSL_CERTIFICATE_ARN }}"
        existing_cloudfront_distribution_id = "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"
        existing_s3_bucket_name = "samaydlette.com"
        cloudfront_price_class = "${{ vars.CLOUDFRONT_PRICE_CLASS || 'PriceClass_100' }}"
        manage_dns = ${{ vars.MANAGE_DNS || 'true' }}
        compliance_check_schedule = "${{ vars.COMPLIANCE_SCHEDULE || 'rate(1 day)' }}"
        section_508_compliance_level = "${{ vars.SECTION_508_LEVEL || 'AA' }}"
        create_silk_reeling = true
        silk_reeling_package_path = "./silk-reeling.zip"
        EOF

    - name: Download Terraform Plan Artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: terraform-plan
        path: infrastructure/

    # SAST results from the security-scan job (Checkov SARIF + tfsec JSON).
    # Consumed by the VDR aggregator step further down.
    - name: Download SAST Results Artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: sast-results
        path: infrastructure/

    # -------------------------------------------------------------------------
    # REBUILD MONITORING FUNCTION
    # -------------------------------------------------------------------------
    - name: Install Lambda dependencies
      working-directory: infrastructure/lambda
      run: npm ci --omit=dev

    - name: Create Lambda deployment package
      working-directory: infrastructure
      run: |
        # The runtime Lambda evaluates the same Rego policies the deploy gate
        # uses, compiled to Wasm. One source of truth, one trust chain, no
        # hand-port drift. The Wasm build is byte-stable for a fixed OPA
        # version + policy sources, so terraform's source_code_hash from the
        # compliance-check job matches the bytes deployed here.
        echo "Compiling the policy packages to Wasm for the runtime emitter..."
        opa build -t wasm -e terraform/compliance/compliance_report \
          -o /tmp/opa-bundle.tar.gz policy/
        tar -xzf /tmp/opa-bundle.tar.gz -C lambda /policy.wasm
        # Parameters-as-data: the bundle's data document (built from
        # infrastructure/policy/config/data.json) ships alongside the wasm;
        # the Lambda loads it via setData at cold start.
        tar -xzOf /tmp/opa-bundle.tar.gz /data.json > lambda/policy-data.json
        ls -la lambda/policy.wasm lambda/policy-data.json

        echo "Creating Lambda deployment package..."
        cd lambda
        zip -r ../opa-compliance.zip .
        cd ..
        echo "Lambda package created:"
        ls -la opa-compliance.zip

    - name: Terraform Init
      working-directory: infrastructure
      run: terraform init -input=false
    
    # -------------------------------------------------------------------------
    # BUILD THE INFRASTRUCTURE  
    # -------------------------------------------------------------------------
    - name: Import Existing Resources (if needed)
      if: ${{ env.REBUILD_STATE == 'true' }}
      working-directory: infrastructure
      run: |
        echo "Checking for existing AWS resources to import..."
        
        # Import IAM role if it exists
        if aws iam get-role --role-name "samaydlette-com-lambda-opa-role" >/dev/null 2>&1; then
          echo "IAM role exists in AWS"
          if ! terraform state show aws_iam_role.lambda_opa >/dev/null 2>&1; then
            echo "Importing IAM role..."
            terraform import aws_iam_role.lambda_opa "samaydlette-com-lambda-opa-role"
            echo "✅ IAM role imported"
          else
            echo "IAM role already in Terraform state"
          fi
        else
          echo "No existing IAM role found - will be created"
        fi
        
        # Import IAM role policy if it exists
        if aws iam get-role-policy --role-name "samaydlette-com-lambda-opa-role" --policy-name "samaydlette-com-lambda-opa-policy" >/dev/null 2>&1; then
          echo "IAM role policy exists in AWS"
          if ! terraform state show aws_iam_role_policy.lambda_opa >/dev/null 2>&1; then
            echo "Importing IAM role policy..."
            terraform import aws_iam_role_policy.lambda_opa "samaydlette-com-lambda-opa-role:samaydlette-com-lambda-opa-policy"
            echo "✅ IAM role policy imported"
          else
            echo "IAM role policy already in Terraform state"
          fi
        else
          echo "No existing IAM role policy found - will be created"
        fi
        
        # Import the at-rest CMK + its alias if they exist (Task 6, POAM-011/018).
        # State is ephemeral per run, so the unconditional aws_kms_key.at_rest would
        # otherwise be created fresh every run — orphaning keys and colliding on the
        # alias. Resolve the key by its stable alias and adopt both into state.
        if aws kms describe-key --key-id alias/samaydlette-com-at-rest >/dev/null 2>&1; then
          AT_REST_KEY_ID=$(aws kms describe-key --key-id alias/samaydlette-com-at-rest --query 'KeyMetadata.KeyId' --output text)
          echo "At-rest CMK exists in AWS ($AT_REST_KEY_ID)"
          if ! terraform state show aws_kms_key.at_rest >/dev/null 2>&1; then
            echo "Importing at-rest CMK..."
            terraform import aws_kms_key.at_rest "$AT_REST_KEY_ID"
            echo "✅ At-rest CMK imported"
          else
            echo "At-rest CMK already in Terraform state"
          fi
          if ! terraform state show aws_kms_alias.at_rest >/dev/null 2>&1; then
            echo "Importing at-rest CMK alias..."
            terraform import aws_kms_alias.at_rest "alias/samaydlette-com-at-rest"
            echo "✅ At-rest CMK alias imported"
          else
            echo "At-rest CMK alias already in Terraform state"
          fi
        else
          echo "No existing at-rest CMK found - will be created"
        fi

        # Import the compliance Lambda's dead-letter queue if it exists (Task 8b,
        # POAM-013). Ephemeral state: adopt it so it isn't recreated each run.
        DLQ_URL=$(aws sqs get-queue-url --queue-name samaydlette-com-opa-compliance-dlq --query 'QueueUrl' --output text 2>/dev/null || true)
        if [ -n "$DLQ_URL" ] && [ "$DLQ_URL" != "None" ]; then
          if ! terraform state show 'aws_sqs_queue.compliance_dlq[0]' >/dev/null 2>&1; then
            echo "Importing compliance DLQ..."
            terraform import 'aws_sqs_queue.compliance_dlq[0]' "$DLQ_URL"
            echo "✅ compliance DLQ imported"
          else
            echo "Compliance DLQ already in Terraform state"
          fi
        else
          echo "No existing compliance DLQ found - will be created"
        fi

        # Import the runtime-signal signing CMK + alias if they exist (Task 5,
        # POAM-002). Ephemeral state: resolve the key by its stable alias and
        # adopt both so the asymmetric signing key is not recreated each run.
        if aws kms describe-key --key-id alias/samaydlette-com-runtime-signing >/dev/null 2>&1; then
          SIGNING_KEY_ID=$(aws kms describe-key --key-id alias/samaydlette-com-runtime-signing --query 'KeyMetadata.KeyId' --output text)
          echo "Runtime-signing CMK exists in AWS ($SIGNING_KEY_ID)"
          if ! terraform state show aws_kms_key.runtime_signing >/dev/null 2>&1; then
            echo "Importing runtime-signing CMK..."
            terraform import aws_kms_key.runtime_signing "$SIGNING_KEY_ID"
            echo "✅ Runtime-signing CMK imported"
          else
            echo "Runtime-signing CMK already in Terraform state"
          fi
          if ! terraform state show aws_kms_alias.runtime_signing >/dev/null 2>&1; then
            echo "Importing runtime-signing CMK alias..."
            terraform import aws_kms_alias.runtime_signing "alias/samaydlette-com-runtime-signing"
            echo "✅ Runtime-signing CMK alias imported"
          else
            echo "Runtime-signing CMK alias already in Terraform state"
          fi
        else
          echo "No existing runtime-signing CMK found - will be created"
        fi

        # Import DNSSEC resources if they exist (Task 5 PR B, D-3). Ephemeral
        # state: the KSK (us-east-1 KMS key), its alias, the Route 53 key-signing
        # key, and the hosted-zone-dnssec association are adopted so they are not
        # recreated each run. All are no-ops on the first deploy (created then).
        if aws kms describe-key --region us-east-1 --key-id alias/samaydlette-com-dnssec-ksk >/dev/null 2>&1; then
          DNSSEC_KEY_ID=$(aws kms describe-key --region us-east-1 --key-id alias/samaydlette-com-dnssec-ksk --query 'KeyMetadata.KeyId' --output text)
          # Resolve the zone via list-hosted-zones (the deploy role has this; it
          # does not have ListHostedZonesByName).
          ZONE_ID=$(aws route53 list-hosted-zones --query "HostedZones[?Name=='samaydlette.com.'].Id | [0]" --output text | sed 's#/hostedzone/##')
          echo "DNSSEC KSK exists ($DNSSEC_KEY_ID), zone $ZONE_ID"
          terraform state show 'aws_kms_key.dnssec_ksk[0]' >/dev/null 2>&1 || terraform import 'aws_kms_key.dnssec_ksk[0]' "$DNSSEC_KEY_ID"
          terraform state show 'aws_kms_alias.dnssec_ksk[0]' >/dev/null 2>&1 || terraform import 'aws_kms_alias.dnssec_ksk[0]' "alias/samaydlette-com-dnssec-ksk"
          # The KSK and zone-signing association may not exist yet (created on the
          # run that first enables signing), so tolerate a failed import.
          if [ -n "$ZONE_ID" ] && [ "$ZONE_ID" != "None" ]; then
            terraform state show 'aws_route53_key_signing_key.this[0]' >/dev/null 2>&1 || terraform import 'aws_route53_key_signing_key.this[0]' "${ZONE_ID},samaydlette_com_ksk" || echo "KSK not created yet - will be created"
            terraform state show 'aws_route53_hosted_zone_dnssec.this[0]' >/dev/null 2>&1 || terraform import 'aws_route53_hosted_zone_dnssec.this[0]' "$ZONE_ID" || echo "zone signing not enabled yet - will be enabled"
          fi
          echo "✅ DNSSEC resources imported (where present)"
        else
          echo "No existing DNSSEC KSK found - will be created"
        fi

        # Import the access-log bucket if it exists (Task 7, POAM-005). Ephemeral
        # state: the bucket would otherwise be recreated each run (and fail as a
        # name collision), so adopt it when present.
        if aws s3api head-bucket --bucket samaydlette-com-logs >/dev/null 2>&1; then
          if ! terraform state show aws_s3_bucket.logs >/dev/null 2>&1; then
            echo "Importing access-log bucket..."
            terraform import aws_s3_bucket.logs samaydlette-com-logs
            echo "✅ access-log bucket imported"
          else
            echo "Access-log bucket already in Terraform state"
          fi
        else
          echo "No existing access-log bucket found - will be created"
        fi

        # Import the compliance Lambda's log group if it exists (auto-created by
        # Lambda; now managed for customer-CMK encryption + retention, POAM-018).
        # Must precede the Lambda import since the function depends_on it.
        if aws logs describe-log-groups --log-group-name-prefix "/aws/lambda/samaydlette-com-opa-compliance" --query 'logGroups[?logGroupName==`/aws/lambda/samaydlette-com-opa-compliance`]' --output text | grep -q .; then
          echo "Compliance Lambda log group exists in AWS"
          if ! terraform state show 'aws_cloudwatch_log_group.opa_compliance[0]' >/dev/null 2>&1; then
            echo "Importing compliance Lambda log group..."
            terraform import 'aws_cloudwatch_log_group.opa_compliance[0]' "/aws/lambda/samaydlette-com-opa-compliance"
            echo "✅ Compliance Lambda log group imported"
          else
            echo "Compliance Lambda log group already in Terraform state"
          fi
        else
          echo "No existing compliance Lambda log group found - will be created"
        fi

        # Import Lambda function if it exists
        if aws lambda get-function --function-name "samaydlette-com-opa-compliance" >/dev/null 2>&1; then
          echo "Lambda function exists in AWS"
          if ! terraform state show 'aws_lambda_function.opa_compliance[0]' >/dev/null 2>&1; then
            echo "Importing Lambda function..."
            terraform import 'aws_lambda_function.opa_compliance[0]' "samaydlette-com-opa-compliance"
            echo "✅ Lambda function imported"
          else
            echo "Lambda function already in Terraform state"
          fi
        else
          echo "No existing Lambda function found - will be created"
        fi
        
        # Import EventBridge rule if it exists
        if aws events describe-rule --name "samaydlette-com-opa-compliance" >/dev/null 2>&1; then
          echo "EventBridge rule exists in AWS"
          if ! terraform state show 'aws_cloudwatch_event_rule.opa_compliance[0]' >/dev/null 2>&1; then
            echo "Importing EventBridge rule..."
            terraform import 'aws_cloudwatch_event_rule.opa_compliance[0]' "samaydlette-com-opa-compliance"
            echo "✅ EventBridge rule imported"
          else
            echo "EventBridge rule already in Terraform state"
          fi
        else
          echo "No existing EventBridge rule found - will be created"
        fi
        
        # Import EventBridge target if it exists (targets are part of the rule, check if targets exist)
        if aws events list-targets-by-rule --rule "samaydlette-com-opa-compliance" --query 'Targets[?Id==`TriggerLambdaTarget`]' --output text >/dev/null 2>&1; then
          echo "EventBridge target exists in AWS"
          if ! terraform state show 'aws_cloudwatch_event_target.lambda[0]' >/dev/null 2>&1; then
            echo "Importing EventBridge target..."
            terraform import 'aws_cloudwatch_event_target.lambda[0]' "samaydlette-com-opa-compliance/TriggerLambdaTarget"
            echo "✅ EventBridge target imported"
          else
            echo "EventBridge target already in Terraform state"
          fi
        else
          echo "No existing EventBridge target found - will be created"
        fi
        
        # Import Lambda permission if it exists
        if aws lambda get-policy --function-name "samaydlette-com-opa-compliance" >/dev/null 2>&1; then
          echo "Lambda function has permissions configured"
          if ! terraform state show 'aws_lambda_permission.allow_eventbridge[0]' >/dev/null 2>&1; then
            echo "Importing Lambda permission..."
            terraform import 'aws_lambda_permission.allow_eventbridge[0]' "samaydlette-com-opa-compliance/AllowExecutionFromEventBridge"
            echo "✅ Lambda permission imported"
          else
            echo "Lambda permission already in Terraform state"
          fi
        else
          echo "No existing Lambda permissions found - will be created"
        fi
    
    # -------------------------------------------------------------------------
    # BUILD THE SILK REELING APP (gated project) — clones silk-reeling-mirror,
    # builds the SPA for the /silk-reeling/ path, and assembles a slim Lambda zip
    # (browser does the ML, so no OpenCV/MediaPipe). Terraform picks up the zip
    # via silk_reeling_package_path (set in tfvars above).
    # -------------------------------------------------------------------------
    - name: Build Silk Reeling app (frontend + slim Lambda zip)
      working-directory: infrastructure
      env:
        SILK_REELING_REF: ${{ vars.SILK_REELING_REF || 'main' }}
        SILK_REELING_REPO_TOKEN: ${{ secrets.SILK_REELING_REPO_TOKEN }}
      run: |
        set -euo pipefail
        rm -rf _silk_src _pkg silk-reeling.zip
        git clone --depth 1 --branch "$SILK_REELING_REF" \
          "https://x-access-token:${SILK_REELING_REPO_TOKEN}@github.com/sam-aydlette/silk-reeling-mirror.git" _silk_src
        # Resolve the Cognito config (provisioned in Task 3 PR-1) so the SPA's
        # Hosted-UI login flow is wired at build time.
        SILK_POOL_ID=$(aws cognito-idp list-user-pools --max-results 60 --query "UserPools[?Name=='samaydlette-com-silk-reeling-users'].Id | [0]" --output text 2>/dev/null || true)
        SILK_CLIENT_ID=$(aws cognito-idp list-user-pool-clients --user-pool-id "$SILK_POOL_ID" --query "UserPoolClients[?ClientName=='samaydlette-com-silk-reeling-spa'].ClientId | [0]" --output text 2>/dev/null || true)
        ( cd _silk_src/frontend && npm ci && \
          VITE_API_BASE=/silk-reeling \
          VITE_COGNITO_DOMAIN="samaydlette-com-silk-reeling.auth.us-east-2.amazoncognito.com" \
          VITE_COGNITO_CLIENT_ID="$SILK_CLIENT_ID" \
          VITE_COGNITO_REDIRECT_URI="https://samaydlette.com/silk-reeling/" \
          npm run build -- --base=/silk-reeling/ )
        mkdir -p _pkg
        # Target the Lambda runtime (python3.13 / manylinux x86_64) explicitly so
        # numpy/pydantic-core C-extension wheels match the runtime ABI regardless
        # of the runner's own Python (which may differ and would otherwise ship
        # cp312 .so files into a cp313 runtime -> Runtime.ImportModuleError).
        python3 -m pip install --quiet --target _pkg \
          --platform manylinux2014_x86_64 --python-version 3.13 \
          --implementation cp --only-binary=:all: \
          -r _silk_src/backend/requirements-lambda.txt
        cp -r _silk_src/backend _pkg/backend
        cp _silk_src/lambda_handler.py _pkg/lambda_handler.py
        cp -r _silk_src/reference_data _pkg/reference_data
        cp -r _silk_src/frontend/dist _pkg/spa
        rm -rf _pkg/backend/__pycache__
        ( cd _pkg && zip -qr ../silk-reeling.zip . )
        echo "silk-reeling.zip size: $(du -h silk-reeling.zip | cut -f1)"

    # -------------------------------------------------------------------------
    # SCAN SILK REELING DEPENDENCIES (Software Composition Analysis) — closes the
    # VDR-CSO-DET gap for the Silk Reeling app. Dependabot watches only this
    # repo's npm/Terraform/Actions manifests; the app's dep manifests live in the
    # separate silk-reeling-mirror repo and reach production via the slim Lambda
    # zip (_pkg) and the SPA bundle. Syft inventories both dependency trees and
    # Grype maps them to CVEs/GHSAs. The VDR aggregator (downstream) is what
    # evaluates and enforces the Class C remediation SLAs, so this step never
    # fails the build on findings — it only has to emit a valid grype.json.
    # Runs unconditionally on the deploy path, mirroring the build step above.
    # -------------------------------------------------------------------------
    - name: Scan Silk Reeling dependencies (Syft SBOM + Grype)
      working-directory: infrastructure
      run: |
        set +e   # SCA findings must never fail the build; the VDR gate does that
        # Install Syft + Grype from the official anchore install.sh, pinned to the
        # same tag as the tool version (mirrors the SHA/version-pinned OPA install).
        curl -sSfL "https://raw.githubusercontent.com/anchore/syft/${SYFT_VERSION}/install.sh" \
          | sh -s -- -b /usr/local/bin "${SYFT_VERSION}"
        curl -sSfL "https://raw.githubusercontent.com/anchore/grype/${GRYPE_VERSION}/install.sh" \
          | sh -s -- -b /usr/local/bin "${GRYPE_VERSION}"
        syft version && grype version
        # Inventory both ecosystems separately: the installed Python deps live in
        # _pkg (the Lambda zip staging dir); the JS resolved tree is in
        # _silk_src/frontend (package-lock.json present after npm ci above).
        # --select-catalogers restricts each scan to the ecosystem we actually
        # ship, so Syft does NOT catalog build-tool native binaries (e.g.
        # esbuild's embedded Go runtime under node_modules), which would
        # otherwise flood the VDR and the inventory with out-of-boundary
        # golang/stdlib findings that are in neither the Lambda nor the browser.
        syft dir:_pkg               -o cyclonedx-json=sbom-python.json --select-catalogers python     || true
        syft dir:_silk_src/frontend -o cyclonedx-json=sbom-js.json     --select-catalogers javascript || true
        # Grype each SBOM. `|| true` so a scan error still leaves a file behind.
        grype sbom:sbom-python.json -o json > grype-python.json || true
        grype sbom:sbom-js.json     -o json > grype-js.json     || true
        # Normalize: any file that is missing/invalid/lacking .matches becomes an
        # empty match set so the merge below cannot fail and ingest_grype always
        # gets a valid top-level .matches[] array.
        for f in grype-python.json grype-js.json; do
          jq -e '.matches' "$f" >/dev/null 2>&1 || echo '{"matches":[]}' > "$f"
        done
        # Merge the two scans into one grype.json (single .matches[] array) that
        # --grype reads. The aggregator is what classifies and gates them.
        jq -s '{matches: (map(.matches) | add)}' grype-python.json grype-js.json > grype.json
        echo "grype.json: $(jq '.matches | length' grype.json) match(es) across Python + JS deps"

    # -------------------------------------------------------------------------
    # IMPORT SILK REELING RESOURCES (if they exist) — local state isn't
    # persisted across runs, so adopt any already-created silk-reeling resources
    # into state before plan/apply (mirrors "Import Existing Resources" above).
    # -------------------------------------------------------------------------
    - name: Import Silk Reeling resources (if needed)
      if: ${{ env.REBUILD_STATE == 'true' }}
      working-directory: infrastructure
      run: |
        set +e   # handle each guard/import explicitly; a missing resource is fine
        import_silk() {
          if terraform state show "$1" >/dev/null 2>&1; then echo "in state: $1"; return; fi
          echo "importing: $1"; terraform import "$1" "$2" || echo "import skipped: $1"
        }
        KEY_ID=$(aws kms describe-key --key-id alias/samaydlette-com-silk-reeling --query 'KeyMetadata.KeyId' --output text 2>/dev/null || true)
        if [ -n "$KEY_ID" ] && [ "$KEY_ID" != "None" ]; then
          import_silk 'aws_kms_key.silk_reeling[0]' "$KEY_ID"
          import_silk 'aws_kms_alias.silk_reeling[0]' 'alias/samaydlette-com-silk-reeling'
        fi
        aws iam get-role --role-name samaydlette-com-silk-reeling-role >/dev/null 2>&1 && \
          import_silk 'aws_iam_role.silk_reeling[0]' 'samaydlette-com-silk-reeling-role'
        aws iam get-role-policy --role-name samaydlette-com-silk-reeling-role --policy-name samaydlette-com-silk-reeling-policy >/dev/null 2>&1 && \
          import_silk 'aws_iam_role_policy.silk_reeling[0]' 'samaydlette-com-silk-reeling-role:samaydlette-com-silk-reeling-policy'
        aws logs describe-log-groups --log-group-name-prefix /aws/lambda/samaydlette-com-silk-reeling --query 'logGroups[0].logGroupName' --output text 2>/dev/null | grep -q silk-reeling && \
          import_silk 'aws_cloudwatch_log_group.silk_reeling[0]' '/aws/lambda/samaydlette-com-silk-reeling'
        aws logs describe-log-groups --log-group-name-prefix /aws/apigateway/samaydlette-com-silk-reeling --query 'logGroups[0].logGroupName' --output text 2>/dev/null | grep -q silk-reeling && \
          import_silk 'aws_cloudwatch_log_group.silk_apigw[0]' '/aws/apigateway/samaydlette-com-silk-reeling'
        aws secretsmanager describe-secret --secret-id samaydlette-com-silk-reeling-anthropic-api-key >/dev/null 2>&1 && \
          import_silk 'aws_secretsmanager_secret.silk_anthropic[0]' 'samaydlette-com-silk-reeling-anthropic-api-key'
        aws lambda get-function --function-name samaydlette-com-silk-reeling >/dev/null 2>&1 && \
          import_silk 'aws_lambda_function.silk_reeling[0]' 'samaydlette-com-silk-reeling'
        # Retire any orphaned Function URL from the pre-API-Gateway deployment —
        # Terraform no longer manages it (the account blocks public access anyway),
        # so delete it to avoid a stray public-NONE endpoint lingering.
        aws lambda get-function-url-config --function-name samaydlette-com-silk-reeling >/dev/null 2>&1 && \
          aws lambda delete-function-url-config --function-name samaydlette-com-silk-reeling 2>/dev/null && \
          echo "deleted orphaned function URL config"
        # API Gateway HTTP API (replaces the Function URL).
        SILK_API_ID=$(aws apigatewayv2 get-apis --query "Items[?Name=='samaydlette-com-silk-reeling'].ApiId | [0]" --output text 2>/dev/null || true)
        if [ -n "$SILK_API_ID" ] && [ "$SILK_API_ID" != "None" ]; then
          import_silk 'aws_apigatewayv2_api.silk_reeling[0]' "$SILK_API_ID"
          SILK_INT_ID=$(aws apigatewayv2 get-integrations --api-id "$SILK_API_ID" --query 'Items[0].IntegrationId' --output text 2>/dev/null || true)
          [ -n "$SILK_INT_ID" ] && [ "$SILK_INT_ID" != "None" ] && \
            import_silk 'aws_apigatewayv2_integration.silk_reeling[0]' "$SILK_API_ID/$SILK_INT_ID"
          SILK_ROUTE_ID=$(aws apigatewayv2 get-routes --api-id "$SILK_API_ID" --query "Items[?RouteKey=='\$default'].RouteId | [0]" --output text 2>/dev/null || true)
          [ -n "$SILK_ROUTE_ID" ] && [ "$SILK_ROUTE_ID" != "None" ] && \
            import_silk 'aws_apigatewayv2_route.silk_reeling[0]' "$SILK_API_ID/$SILK_ROUTE_ID"
          aws apigatewayv2 get-stage --api-id "$SILK_API_ID" --stage-name '$default' >/dev/null 2>&1 && \
            import_silk 'aws_apigatewayv2_stage.silk_reeling[0]' "$SILK_API_ID/\$default"
          # Cognito JWT authorizer + the /api route (Task 3).
          SILK_AUTH_ID=$(aws apigatewayv2 get-authorizers --api-id "$SILK_API_ID" --query "Items[?Name=='samaydlette-com-silk-reeling-cognito'].AuthorizerId | [0]" --output text 2>/dev/null || true)
          [ -n "$SILK_AUTH_ID" ] && [ "$SILK_AUTH_ID" != "None" ] && \
            import_silk 'aws_apigatewayv2_authorizer.silk_reeling[0]' "$SILK_API_ID/$SILK_AUTH_ID"
          SILK_API_ROUTE_ID=$(aws apigatewayv2 get-routes --api-id "$SILK_API_ID" --query "Items[?RouteKey=='ANY /api/{proxy+}'].RouteId | [0]" --output text 2>/dev/null || true)
          [ -n "$SILK_API_ROUTE_ID" ] && [ "$SILK_API_ROUTE_ID" != "None" ] && \
            import_silk 'aws_apigatewayv2_route.silk_reeling_api[0]' "$SILK_API_ID/$SILK_API_ROUTE_ID"
        fi
        aws lambda get-policy --function-name samaydlette-com-silk-reeling --query 'Policy' --output text 2>/dev/null | grep -q AllowApiGatewayInvoke && \
          import_silk 'aws_lambda_permission.silk_reeling_apigw[0]' 'samaydlette-com-silk-reeling/AllowApiGatewayInvoke'
        # Cognito (Task 3) — ephemeral state; adopt the pool/client/domain if present.
        SILK_POOL_ID=$(aws cognito-idp list-user-pools --max-results 60 --query "UserPools[?Name=='samaydlette-com-silk-reeling-users'].Id | [0]" --output text 2>/dev/null || true)
        if [ -n "$SILK_POOL_ID" ] && [ "$SILK_POOL_ID" != "None" ]; then
          import_silk 'aws_cognito_user_pool.silk_reeling[0]' "$SILK_POOL_ID"
          SILK_CLIENT_ID=$(aws cognito-idp list-user-pool-clients --user-pool-id "$SILK_POOL_ID" --query "UserPoolClients[?ClientName=='samaydlette-com-silk-reeling-spa'].ClientId | [0]" --output text 2>/dev/null || true)
          [ -n "$SILK_CLIENT_ID" ] && [ "$SILK_CLIENT_ID" != "None" ] && \
            import_silk 'aws_cognito_user_pool_client.silk_reeling[0]' "${SILK_POOL_ID}/${SILK_CLIENT_ID}"
        fi
        aws cognito-idp describe-user-pool-domain --domain samaydlette-com-silk-reeling --query 'DomainDescription.UserPoolId' --output text 2>/dev/null | grep -q . && \
          import_silk 'aws_cognito_user_pool_domain.silk_reeling[0]' 'samaydlette-com-silk-reeling'
        echo "Silk Reeling import step complete"

    - name: Generate fresh Terraform plan
      working-directory: infrastructure
      run: terraform plan -lock-timeout=300s -out=tfplan

    - name: Terraform Apply
      working-directory: infrastructure
      run: terraform apply -lock-timeout=300s -auto-approve tfplan

    # -------------------------------------------------------------------------
    # SEED SILK REELING SECRETS (out-of-band) — set the Anthropic key into Secrets
    # Manager from a GitHub secret, so plaintext never lands in Terraform state.
    # (The basic-auth credential was removed in Task 3 — auth is now Cognito.)
    # -------------------------------------------------------------------------
    - name: Seed Silk Reeling secrets
      working-directory: infrastructure
      env:
        SILK_REELING_ANTHROPIC_KEY: ${{ secrets.SILK_REELING_ANTHROPIC_KEY }}
      run: |
        set -euo pipefail
        ARNS=$(terraform output -json silk_reeling_secret_arns)
        ANTH_ARN=$(echo "$ARNS" | jq -r '.anthropic_key // empty')
        if [ -n "${SILK_REELING_ANTHROPIC_KEY:-}" ] && [ -n "$ANTH_ARN" ]; then
          aws secretsmanager put-secret-value --secret-id "$ANTH_ARN" \
            --secret-string "$SILK_REELING_ANTHROPIC_KEY" >/dev/null
          echo "seeded anthropic key"
        fi

    # -------------------------------------------------------------------------
    # CACHE-BUST WEBSITE ASSETS
    # -------------------------------------------------------------------------
    # Bumps the ?v=<timestamp> query string on every CSS/JS reference in
    # website/**.html so browsers refetch assets rather than serving stale
    # cached copies. Runs in-place; the next step uploads the rewritten files.
    # -------------------------------------------------------------------------
    - name: Cache-bust website assets
      run: node update-cache-version.js

    # -------------------------------------------------------------------------
    # UPLOAD WEBSITE FILES
    # -------------------------------------------------------------------------
    # Put the actual website files on the internet
    # -------------------------------------------------------------------------
    - name: Sync Website Content
      run: |
        echo "Getting S3 bucket name from Terraform outputs..."
        cd infrastructure
        
        BUCKET_NAME=$(terraform output -raw s3_bucket_name 2>/dev/null || echo "")
        # Public Cognito config for the SPA, published below after the sync.
        AUTH_CFG=$(terraform output -raw silk_reeling_auth_config_json 2>/dev/null || echo "")

        if [ -z "$BUCKET_NAME" ]; then
          echo "❌ Could not get S3 bucket name from Terraform outputs"
          echo "Available outputs:"
          terraform output 2>/dev/null || echo "No outputs available"
          exit 1
        fi
        
        echo "✅ S3 bucket name: $BUCKET_NAME"
        echo "Syncing website content..."
        
        cd ..
        
        # Upload website files, skip infrastructure code
        aws s3 sync website/ s3://$BUCKET_NAME/ \
          --exclude "*.tf" \
          --exclude "*.tfvars*" \
          --exclude "*.tfstate*" \
          --exclude ".terraform/*" \
          --exclude "infrastructure/*" \
          --exclude "scripts/*" \
          --exclude ".git/*" \
          --exclude "README.md" \
          --exclude "Makefile" \
          --exclude ".gitignore" \
          --exclude ".github/*" \
          --delete

        echo "✅ Website content synced successfully"

        # Publish the public Cognito config for the SPA AFTER the sync's --delete
        # (so it isn't removed). The SPA fetches /.well-known/silk-reeling-auth.json
        # to resolve the live client_id at runtime. Written via cp (the deploy role
        # has PutObject; an aws_s3_object resource fails on GetObjectTagging).
        if [ -n "$AUTH_CFG" ]; then
          printf '%s' "$AUTH_CFG" > /tmp/silk-reeling-auth.json
          aws s3 cp /tmp/silk-reeling-auth.json "s3://$BUCKET_NAME/.well-known/silk-reeling-auth.json" \
            --content-type application/json --cache-control no-cache
          echo "✅ Published /.well-known/silk-reeling-auth.json"
        fi

    # -------------------------------------------------------------------------
    # BUILD AND PUBLISH THE DEPLOY-TIME KSI SIGNAL
    # -------------------------------------------------------------------------
    # The signal joins terraform state, the Lambda's package-lock, the website
    # HTML hashes, the CI provenance from GITHUB_* env vars, and the OPA
    # validations from the compliance-check job into a single signed JSON
    # document at /.well-known/ksi-signal.json. See the research paper at
    # /research/cato-without-the-ato.html for the full rationale.
    # -------------------------------------------------------------------------
    - name: Build deploy-time KSI signal
      working-directory: infrastructure
      env:
        # Tells the emitter to pre-populate provenance.attestation with the
        # sidecar bundle URL before signing. The URL is well-known.
        KSI_SIGN: "1"
      run: |
        echo "Building deploy-time KSI signal..."
        python3 ../scripts/build-ksi-signal.py
        echo "Signal contents (truncated):"
        jq '{signal_id, emitted_at, csp, system_id,
             component_count: (.components | length),
             validation_count: (.validations | length),
             attestation: .provenance.attestation,
             validation_results: [.validations[].result] | group_by(.) | map({(.[0]): length}) | add}' \
          ksi-signal.json

    # Inventory gate: block the deploy if the emitted canonical inventory is
    # malformed (invalid/duplicate identifiers). The inventory is the join layer
    # the whole architecture rests on, so this runs BEFORE signing/publishing.
    - name: Gate KSI signal (PURL validity, native_id uniqueness, typing)
      working-directory: infrastructure
      run: python3 ../scripts/validate-ksi-signal.py ksi-signal.json

    # -------------------------------------------------------------------------
    # SIGN THE KSI SIGNAL (Sigstore keyless via GitHub OIDC)
    # -------------------------------------------------------------------------
    # Produces a Sigstore bundle (cert + signature + Rekor inclusion proof) as
    # ksi-signal.bundle. Verifiers fetch both files and run:
    #   cosign verify-blob --bundle ksi-signal.bundle \
    #     --certificate-identity 'https://github.com/sam-aydlette/samaydlette.com/.github/workflows/deploy-with-opa.yml@refs/heads/main' \
    #     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
    #     ksi-signal.json
    # -------------------------------------------------------------------------
    - name: Install cosign
      uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

    - name: Sign KSI signal
      working-directory: infrastructure
      run: |
        echo "Signing ksi-signal.json with cosign keyless..."
        cosign sign-blob --yes --bundle ksi-signal.bundle ksi-signal.json
        echo "Bundle written:"
        ls -la ksi-signal.bundle

    # -------------------------------------------------------------------------
    # SIGN + VERIFY THE OPA POLICY BUNDLE (supply-chain hardening — Task 13 / S1)
    # -------------------------------------------------------------------------
    # The deploy gate evaluates the policy packages and the runtime emitter re-validates
    # with the Wasm compiled from the same source (/tmp/opa-bundle.tar.gz, built in
    # the "Create Lambda zip file" step and shipped in the Lambda package). Sign
    # that compiled bundle keyless and verify the signature here against the pinned
    # workflow identity, so the policy that gates the deploy and re-runs at runtime
    # is tamper-evident and independently verifiable rather than trusted implicitly.
    # Fails closed if the signature or identity does not check. Additive only — no
    # change to any existing artifact or its signature.
    - name: Sign and verify the OPA policy bundle
      working-directory: infrastructure
      run: |
        cp /tmp/opa-bundle.tar.gz opa-policy-bundle.tar.gz
        echo "Signing the compiled OPA policy bundle with cosign keyless..."
        cosign sign-blob --yes --bundle opa-policy-bundle.tar.gz.bundle opa-policy-bundle.tar.gz
        echo "Verifying the signature against the pinned workflow identity (fail closed)..."
        cosign verify-blob \
          --bundle opa-policy-bundle.tar.gz.bundle \
          --certificate-identity 'https://github.com/sam-aydlette/samaydlette.com/.github/workflows/deploy-with-opa.yml@refs/heads/main' \
          --certificate-oidc-issuer https://token.actions.githubusercontent.com \
          opa-policy-bundle.tar.gz
        echo "✅ OPA policy bundle signed and verified against the pinned identity"

    # -------------------------------------------------------------------------
    # BUILD THE OSCAL REV 5 SSP  (published after the reconciliation gate)
    # -------------------------------------------------------------------------
    # Generates a NIST OSCAL System Security Plan (FedRAMP Rev 5 Moderate
    # baseline shape) from the canonical inventory and the FedRAMP KSI catalog. Sits
    # alongside the KSI signal at /.well-known/oscal-ssp.json.
    # -------------------------------------------------------------------------
    - name: Build OSCAL Rev 5 SSP
      working-directory: infrastructure
      run: |
        echo "Building OSCAL SSP..."
        python3 ../scripts/build-oscal-ssp.py
        echo "SSP summary:"
        jq '{
          uuid: ."system-security-plan".uuid,
          oscal_version: ."system-security-plan".metadata."oscal-version",
          components: (."system-security-plan"."system-implementation".components | length),
          control_count: (."system-security-plan"."control-implementation"."implemented-requirements" | length),
          ksi_signal_id: ."system-security-plan".metadata.props[0].value
        }' oscal-ssp.json

    # Stamp the paper + dashboard figures from the just-built SSP (modifies the
    # local HTML only; the re-upload happens in the publish block after the gate).
    - name: Stamp single-source figures (paper + dashboard)
      working-directory: infrastructure
      run: |
        python3 ../scripts/inject-figures.py
        echo "✅ Figures stamped from live artifacts (upload deferred to publish phase)"

    - name: Sign OSCAL SSP
      working-directory: infrastructure
      run: |
        echo "Signing oscal-ssp.json with cosign keyless..."
        cosign sign-blob --yes --bundle oscal-ssp.bundle oscal-ssp.json

    # -------------------------------------------------------------------------
    # BUILD THE VDR REPORT  (published after the reconciliation gate) (FedRAMP 20x VDR-RPT-PER, VDR-TFR-MHR)
    # -------------------------------------------------------------------------
    # Aggregates SAST/SCA findings (currently OPA gate; Checkov, tfsec, and
    # Dependabot are wired in via optional --flags as those tools are added
    # to the workflow), classifies each per VDR-EVA-* (PAIN N1-N5, IRV, LEV),
    # and emits a Class C-tiered report. The build is the report. If any
    # finding exceeds the Class C tolerance per VDR-TFR-PVR, this step exits
    # non-zero and the build fails — the report becomes the block.
    # -------------------------------------------------------------------------
    # Fetch the previous published VDR report to use as the first-detected
    # ledger; the SLA clock (VDR-TFR-PVR) only ticks if first_detected is
    # preserved across builds. If the live URL is unreachable (first deploy,
    # or transient failure), the script falls back to treating all findings
    # as newly detected — safe default.
    - name: Fetch previous VDR report (first-detected ledger)
      working-directory: infrastructure
      run: |
        if curl -sfL -o previous-vdr-report.json \
            "https://samaydlette.com/.well-known/vdr-report.json"; then
          echo "Previous VDR report fetched ($(wc -c < previous-vdr-report.json) bytes); using as first-detected ledger."
        else
          echo "::warning::Could not fetch previous VDR report; first-detected ledger will be empty (all findings will be treated as newly detected)."
          echo '{"findings":[]}' > previous-vdr-report.json
        fi

    # Fetch this repo's Dependabot alerts — the SCA / CVE-bearing findings the
    # VDR builder cross-references against the CISA KEV catalog. Without these,
    # KEV matching has nothing to act on (IaC scanners emit no CVEs). Non-blocking:
    # if Dependabot is disabled or the token lacks access, fall back to an empty
    # list (ingest_dependabot treats [] as "no SCA findings").
    - name: Fetch Dependabot alerts (SCA / CVE source)
      working-directory: infrastructure
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if gh api -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/dependabot/alerts?state=open&per_page=100" \
            > dependabot-alerts.json 2>/dev/null \
            && jq -e 'type == "array"' dependabot-alerts.json >/dev/null 2>&1; then
          echo "Dependabot alerts fetched: $(jq 'length' dependabot-alerts.json) open ($(jq '[.[] | select(.security_advisory.cve_id != null)] | length' dependabot-alerts.json) with a CVE)."
        else
          echo "::warning::Could not fetch Dependabot alerts (feature disabled or no access); proceeding with an empty SCA set."
          echo '[]' > dependabot-alerts.json
        fi

    # Fetch the live CISA KEV catalog so the VDR builder can flag any finding
    # whose CVE is a Known Exploited Vulnerability (these block the build). If
    # CISA is unreachable (transient), fall back to an empty catalog — ingest_kev
    # treats a missing/empty file as "no KEVs", so the build still completes.
    - name: Fetch CISA KEV catalog
      working-directory: infrastructure
      run: |
        KEV_URL="https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json"
        if curl -sfL --retry 3 --retry-delay 2 -o kev-catalog.json "$KEV_URL" \
            && jq -e '.vulnerabilities | length > 0' kev-catalog.json >/dev/null 2>&1; then
          echo "CISA KEV catalog fetched: version $(jq -r '.catalogVersion' kev-catalog.json), $(jq '.vulnerabilities | length' kev-catalog.json) CVEs."
        else
          echo "::warning::Could not fetch a valid CISA KEV catalog; proceeding with an empty catalog (no KEV flagging this run)."
          echo '{"vulnerabilities":[]}' > kev-catalog.json
        fi

    # Fetch the daily FIRST EPSS scores so the VDR builder can resolve the
    # Likely-Exploitable axis as the real EPSS union (EPSS >= threshold OR active)
    # rather than the severity proxy. Non-blocking: if the feed is unreachable,
    # fall back to an empty file — ingest_epss then returns no scores and LEV
    # degrades safely to the conservative severity proxy, so the build still
    # completes and nothing is silently downgraded.
    - name: Fetch FIRST EPSS scores
      working-directory: infrastructure
      run: |
        EPSS_URL="https://epss.cyentia.com/epss_scores-current.csv.gz"
        if curl -sfL --retry 3 --retry-delay 2 -o epss-scores.csv.gz "$EPSS_URL" \
            && [ -s epss-scores.csv.gz ]; then
          echo "EPSS scores fetched ($(stat -c%s epss-scores.csv.gz) bytes gzipped)."
        else
          echo "::warning::Could not fetch EPSS scores; LEV falls back to the severity proxy this run."
          printf 'cve,epss,percentile\n' > epss-scores.csv.gz
        fi

    - name: Build VDR Report (FedRAMP 20x Class C)
      working-directory: infrastructure
      run: |
        echo "Building VDR report..."
        python3 ../scripts/build-vdr-report.py \
          --opa validations.json \
          --checkov checkov-results.sarif \
          --tfsec tfsec-results.json \
          --checkov-yaml ../.checkov.yaml \
          --previous-vdr previous-vdr-report.json \
          --dependabot dependabot-alerts.json \
          --grype grype.json \
          --zap ../security/zap/zap-report.json \
          --kev kev-catalog.json \
          --epss epss-scores.csv.gz \
          --output vdr-report.json
        echo "VDR summary:"
        jq '{summary, rules_reference, risk_accepted_count: (.risk_accepted | length)}' vdr-report.json

    # Vulnerability gate (Task T): fail the build on any scanner-reported
    # vulnerability (Grype SCA, ZAP DAST, Dependabot) that is not remediated or
    # dispositioned false-positive / operational-requirement in
    # data/vuln-dispositions.json. Risk-adjustment does not pass.
    - name: Vulnerability gate (fix or categorize every vuln)
      working-directory: infrastructure
      run: |
        python3 ../scripts/vuln-gate.py --vdr vdr-report.json --register ../data/vuln-dispositions.json

    # Append this run's CVE-keyed summary to the rolling vuln trend ledger
    # (RA-5(6)). Fetch the published ledger first so history persists across
    # deploys; the dashboard renders the trend from it.
    - name: Build VDR vuln trend ledger (RA-5(6))
      working-directory: infrastructure
      run: |
        if curl -sfL -o vdr-trend.json "https://samaydlette.com/.well-known/vdr-trend.json"; then
          echo "Previous VDR trend ledger fetched ($(jq '.points | length' vdr-trend.json) points)."
        else
          echo "::warning::No previous VDR trend ledger; starting a fresh one."
          rm -f vdr-trend.json
        fi
        python3 ../scripts/build-vdr-trend.py --report vdr-report.json --trend vdr-trend.json
        cosign sign-blob --yes --bundle vdr-trend.bundle vdr-trend.json

    - name: Sign VDR Report
      working-directory: infrastructure
      run: |
        echo "Signing vdr-report.json with cosign keyless..."
        cosign sign-blob --yes --bundle vdr-report.bundle vdr-report.json

    # -------------------------------------------------------------------------
    # PROJECT THE CANONICAL INVENTORY INTO FEDRAMP IIW (APPENDIX M) SHAPE
    # -------------------------------------------------------------------------
    # The IIW is the third report this codebase derives from one source. The
    # KSI signal is the wire format, the OSCAL SSP is the Rev 5 view, and the
    # IIW is the Excel-compatible shape FedRAMP processes still ask for. All
    # three derive from the canonical inventory in ksi-signal.json.
    # -------------------------------------------------------------------------
    - name: Build IIW (FedRAMP SSP Appendix M)
      working-directory: infrastructure
      run: |
        echo "Projecting KSI signal into IIW shape..."
        python3 ../scripts/build-iiw.py \
          --signal ksi-signal.json \
          --output iiw.csv
        echo "IIW row count: $(($(wc -l < iiw.csv) - 1))"

    - name: Sign IIW CSV
      working-directory: infrastructure
      run: |
        echo "Signing iiw.csv with cosign keyless..."
        cosign sign-blob --yes --bundle iiw.bundle iiw.csv

    # -------------------------------------------------------------------------
    # BUILD THE OSCAL POA&M  (published after the reconciliation gate)
    # -------------------------------------------------------------------------
    # NIST OSCAL Plan of Action and Milestones format. Imports the OSCAL SSP
    # at /.well-known/oscal-ssp.json so a consumer can navigate from a poam
    # item to the system component it concerns. Fields align with FedRAMP
    # Rev 5 Appendix O via FedRAMP-namespaced props.
    # -------------------------------------------------------------------------
    - name: Build OSCAL POA&M
      working-directory: infrastructure
      run: |
        echo "Building OSCAL POA&M..."
        python3 ../scripts/build-oscal-poam.py \
          --ksi-signal ksi-signal.json \
          --output oscal-poam.json
        echo "POA&M items:"
        jq '.["plan-of-action-and-milestones"]["poam-items"] | length' oscal-poam.json

    - name: Build Ongoing Certification Report (CCM)
      working-directory: infrastructure
      run: |
        echo "Building Ongoing Certification Report (CCM-OCR-AVL: quarterly human-readable summary)..."
        python3 ../scripts/build-ocr.py \
          --vdr vdr-report.json \
          --poam oscal-poam.json \
          --ksi-signal ksi-signal.json \
          --scn-register ../docs/scn/scn-register.csv \
          --output ongoing-certification-report.json \
          --md-output ongoing-certification-report.md
        jq '{next_ongoing_certification_report_date, next_quarterly_review_date}' ongoing-certification-report.json

    - name: Build CDS certification-data artifacts (overview, availability, policy index)
      working-directory: infrastructure
      run: |
        echo "Building CDS certification-overview package, availability feed, policy index..."
        # availability history: fetch the previously-published feed (best-effort)
        curl -sfL -o previous-availability.json "https://samaydlette.com/.well-known/availability.json" \
          || echo '{"history":[]}' > previous-availability.json
        python3 ../scripts/build-cds-overview.py \
          --offering ../data/cds/offering.json --profile ../data/system-profile.json --ksi-signal ksi-signal.json
        python3 ../scripts/build-availability.py \
          --previous previous-availability.json --ksi-signal ksi-signal.json
        python3 ../scripts/build-policy-index.py --output policy-index.json --md-output policy-index.md

    - name: Build Security Decision Record (SDR — 20x SSP replacement)
      working-directory: infrastructure
      run: |
        echo "Building Security Decision Record (SDR-CSO-FRR). The Rev5 OSCAL SSP stays as the Rev5-paradigm artifact; both derive from the same hub."
        curl -sfL -o previous-sdr.json "https://samaydlette.com/.well-known/security-decision-record.json" \
          || echo '{}' > previous-sdr.json
        python3 ../scripts/build-sdr.py \
          --ssp oscal-ssp.json --catalog schemas/ksi-catalog.json --ksi-signal ksi-signal.json \
          --vdr vdr-report.json --profile ../data/system-profile.json --previous-sdr previous-sdr.json

    - name: Build Certification Package Overview (CPO)
      working-directory: infrastructure
      run: |
        echo "Building Certification Package Overview (CPO-CSO-OVR); with the SDR, the SSP replacement..."
        python3 ../scripts/build-cpo.py \
          --offering ../data/cds/offering.json --profile ../data/system-profile.json \
          --overview certification-overview-package.json --ksi-signal ksi-signal.json

    # Reconciliation gate (assessment keystone, Task 1). Fails closed if any
    # cross-artifact invariant breaks: live-resource completeness (deny-by-default),
    # SSP/POA&M references resolve to inventory, every Checkov suppression is
    # categorized consistently, one identical impact level everywhere, all
    # artifacts bound to one signal_id, and the staged artifacts carry this run's
    # commit. Runs after all artifacts are built and signed but BEFORE anything is
    # published (Task 1.5): nothing reaches /.well-known/ until this passes, so a
    # gate failure can never leave a partial/stale served set (root of P-1).
    - name: Reconciliation gate (fail closed on drift)
      working-directory: infrastructure
      env:
        GITHUB_SHA: ${{ github.sha }}
      run: |
        echo "Running cross-artifact reconciliation gate..."
        python3 ../scripts/reconcile.py --artifacts-dir . --live --expect-commit "$GITHUB_SHA"

    - name: Sign OSCAL POA&M
      working-directory: infrastructure
      run: |
        echo "Signing oscal-poam.json with cosign keyless..."
        cosign sign-blob --yes --bundle oscal-poam.bundle oscal-poam.json

    - name: Sign Ongoing Certification Report
      working-directory: infrastructure
      run: |
        echo "Signing ongoing-certification-report.json with cosign keyless..."
        cosign sign-blob --yes --bundle ongoing-certification-report.bundle ongoing-certification-report.json

    - name: Sign CDS certification-data artifacts
      working-directory: infrastructure
      run: |
        echo "Signing CDS artifacts with cosign keyless..."
        cosign sign-blob --yes --bundle certification-overview-package.bundle certification-overview-package.json
        cosign sign-blob --yes --bundle availability.bundle availability.json
        cosign sign-blob --yes --bundle policy-index.bundle policy-index.json
        cosign sign-blob --yes --bundle security-decision-record.bundle security-decision-record.json
        cosign sign-blob --yes --bundle certification-package-overview.bundle certification-package-overview.json

    # PUBLISH PHASE — every artifact was built and signed before the gate; this
    # uploads them as one block so the served /.well-known/ set is always
    # internally consistent. Nothing here runs unless the gate above passed.
    - name: Publish all signed artifacts to /.well-known/
      working-directory: infrastructure
      run: |
        BUCKET_NAME=$(terraform output -raw s3_bucket_name)
        # KSI signal + bundle + schema
        aws s3 cp ksi-signal.json "s3://$BUCKET_NAME/.well-known/ksi-signal.json" --content-type application/json --cache-control "public, max-age=300"
        aws s3 cp ksi-signal.bundle "s3://$BUCKET_NAME/.well-known/ksi-signal.bundle" --content-type application/json --cache-control "public, max-age=300"
        aws s3 cp schemas/ksi-signal.schema.json "s3://$BUCKET_NAME/.well-known/ksi-signal.schema.json" --content-type application/schema+json --cache-control "public, max-age=3600"
        # Signed OPA policy bundle (S1): the compiled Wasm the gate + runtime use, plus its keyless signature.
        aws s3 cp opa-policy-bundle.tar.gz "s3://$BUCKET_NAME/.well-known/opa-policy-bundle.tar.gz" --content-type application/gzip --cache-control "public, max-age=300"
        aws s3 cp opa-policy-bundle.tar.gz.bundle "s3://$BUCKET_NAME/.well-known/opa-policy-bundle.tar.gz.bundle" --content-type application/json --cache-control "public, max-age=300"
        # OSCAL SSP
        aws s3 cp oscal-ssp.json "s3://$BUCKET_NAME/.well-known/oscal-ssp.json" --content-type application/oscal+json --cache-control "public, max-age=300"
        aws s3 cp oscal-ssp.bundle "s3://$BUCKET_NAME/.well-known/oscal-ssp.bundle" --content-type application/json --cache-control "public, max-age=300"
        # VDR report + trend
        aws s3 cp vdr-report.json "s3://$BUCKET_NAME/.well-known/vdr-report.json" --content-type application/json --cache-control "public, max-age=300"
        aws s3 cp vdr-report.bundle "s3://$BUCKET_NAME/.well-known/vdr-report.bundle" --content-type application/json --cache-control "public, max-age=300"
        # Human-readable VDR rendering (VER-TFR-MHR); derived from the signed JSON above.
        aws s3 cp vdr-report.md "s3://$BUCKET_NAME/.well-known/vdr-report.md" --content-type "text/markdown; charset=utf-8" --cache-control "public, max-age=300"
        aws s3 cp vdr-trend.json "s3://$BUCKET_NAME/.well-known/vdr-trend.json" --content-type application/json --cache-control "public, max-age=300"
        aws s3 cp vdr-trend.bundle "s3://$BUCKET_NAME/.well-known/vdr-trend.bundle" --content-type application/json --cache-control "public, max-age=300"
        # IIW
        aws s3 cp iiw.csv "s3://$BUCKET_NAME/.well-known/iiw.csv" --content-type text/csv --cache-control "public, max-age=300"
        aws s3 cp iiw.bundle "s3://$BUCKET_NAME/.well-known/iiw.bundle" --content-type application/json --cache-control "public, max-age=300"
        # OSCAL POA&M
        aws s3 cp oscal-poam.json "s3://$BUCKET_NAME/.well-known/oscal-poam.json" --content-type application/oscal+json --cache-control "public, max-age=300"
        aws s3 cp oscal-poam.bundle "s3://$BUCKET_NAME/.well-known/oscal-poam.bundle" --content-type application/json --cache-control "public, max-age=300"
        # Ongoing Certification Report (CCM-OCR-AVL) + human-readable rendering
        aws s3 cp ongoing-certification-report.json "s3://$BUCKET_NAME/.well-known/ongoing-certification-report.json" --content-type application/json --cache-control "public, max-age=300"
        aws s3 cp ongoing-certification-report.bundle "s3://$BUCKET_NAME/.well-known/ongoing-certification-report.bundle" --content-type application/json --cache-control "public, max-age=300"
        aws s3 cp ongoing-certification-report.md "s3://$BUCKET_NAME/.well-known/ongoing-certification-report.md" --content-type "text/markdown; charset=utf-8" --cache-control "public, max-age=300"
        # CDS certification-data artifacts (overview package, availability feed, policy index) + bundles + human-readable
        for a in certification-overview-package availability policy-index security-decision-record certification-package-overview; do
          aws s3 cp "$a.json"   "s3://$BUCKET_NAME/.well-known/$a.json"   --content-type application/json --cache-control "public, max-age=300"
          aws s3 cp "$a.bundle" "s3://$BUCKET_NAME/.well-known/$a.bundle" --content-type application/json --cache-control "public, max-age=300"
          aws s3 cp "$a.md"     "s3://$BUCKET_NAME/.well-known/$a.md"     --content-type "text/markdown; charset=utf-8" --cache-control "public, max-age=300"
        done
        # Stamped paper + dashboard HTML (figures were stamped pre-gate). The
        # paper is only republished while PUBLISH_PLUMBING_PAPER is "true"; it is
        # held back during revision.
        if [ "${PUBLISH_PLUMBING_PAPER:-false}" = "true" ]; then
          aws s3 cp ../website/research/the-plumbing.html "s3://$BUCKET_NAME/research/the-plumbing.html" --content-type "text/html; charset=utf-8" --cache-control "public, max-age=300"
        else
          echo "⏸  PUBLISH_PLUMBING_PAPER!=true — skipping research/the-plumbing.html publish (paper under revision)"
        fi
        aws s3 cp ../website/viewer.html "s3://$BUCKET_NAME/viewer.html" --content-type "text/html; charset=utf-8" --cache-control "public, max-age=300"
        echo "✅ All signed artifacts published to /.well-known/ (post-gate)"

    # -------------------------------------------------------------------------
    # ATTEST ARTIFACT PROVENANCE (SLSA v1 / in-toto, DSSE — Task 14 / S2)
    # -------------------------------------------------------------------------
    # Each core compliance artifact gets a DSSE-signed SLSA provenance
    # attestation binding it to the canonical inventory (ksi-signal.json sha256 +
    # signal_id), the generator that produced it, this commit, and this run. This
    # is the cryptographic form of reconciliation invariant (e) + the publish-
    # freshness commit check: instead of string-matching the signal_id/commit, the
    # binding is a signed attestation any in-toto-aware verifier can consume. Each
    # attestation is verified here against the pinned identity, fail-closed.
    # Additive only — the artifacts and their existing .bundle signatures are
    # unchanged; this publishes new <artifact>.intoto.jsonl alongside them.
    - name: Attest artifact provenance (SLSA/in-toto)
      working-directory: infrastructure
      run: |
        BUCKET_NAME=$(terraform output -raw s3_bucket_name)
        attest() {
          art="$1"; gen="$2"
          python3 ../scripts/build-provenance.py \
            --ksi-signal ksi-signal.json --generator "../$gen" \
            --output "$art.predicate.json"
          # --new-bundle-format emits a Sigstore bundle with the DSSE envelope
          # INLINE (S3), so the in-toto Statement is decodable by any DSSE/in-toto
          # tool, not only by cosign.
          cosign attest-blob --yes --new-bundle-format \
            --predicate "$art.predicate.json" --type slsaprovenance1 \
            --bundle "$art.intoto.jsonl" "$art"
          # 1) cosign verifies the signature + identity (trust).
          cosign verify-blob-attestation --new-bundle-format \
            --bundle "$art.intoto.jsonl" --type slsaprovenance1 \
            --certificate-identity 'https://github.com/sam-aydlette/samaydlette.com/.github/workflows/deploy-with-opa.yml@refs/heads/main' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "$art"
          # 2) a dependency-free, non-cosign consumer reads the predicate and
          #    checks the bindings (subject==artifact, inventory sha256, generator,
          #    commit) - the reciprocity claim, exercised in CI, fail-closed.
          python3 ../scripts/verify-attestation.py \
            --bundle "$art.intoto.jsonl" --artifact "$art" --ksi-signal ksi-signal.json
          aws s3 cp "$art.intoto.jsonl" "s3://$BUCKET_NAME/.well-known/$art.intoto.jsonl" \
            --content-type application/json --cache-control "public, max-age=300"
          echo "  attested (inline-DSSE) + consumed + published: $art.intoto.jsonl"
        }
        # Core canonical evidence set. Extending to the remaining CDS/SDR/CPO
        # artifacts is one attest() line each (tracked follow-on).
        attest ksi-signal.json scripts/build-ksi-signal.py
        attest oscal-ssp.json  scripts/build-oscal-ssp.py
        attest oscal-poam.json scripts/build-oscal-poam.py
        attest vdr-report.json scripts/build-vdr-report.py
        attest iiw.csv         scripts/build-iiw.py
        echo "✅ SLSA/in-toto provenance attestations published for the core compliance artifacts"

    # Sign the research paper itself (a paper whose thesis is verifiability should
    # be verifiable). The signed bytes are the served bytes of
    # /research/the-plumbing.html; the bundle is published at a stable
    # /.well-known/ URL and verifies under the same pinned identity as every
    # other artifact (external review Task 24).
    - name: Sign and publish the research paper
      if: ${{ env.PUBLISH_PLUMBING_PAPER == 'true' }}
      working-directory: infrastructure
      run: |
        BUCKET_NAME=$(terraform output -raw s3_bucket_name)
        cosign sign-blob --yes --bundle paper.bundle ../website/research/the-plumbing.html
        aws s3 cp paper.bundle "s3://$BUCKET_NAME/.well-known/the-plumbing.html.bundle" \
          --content-type application/json \
          --cache-control "public, max-age=300"
        echo "✅ Research paper Sigstore bundle published at /.well-known/the-plumbing.html.bundle"

    # Post-publish round-trip (Task 1.5 / reconciliation invariant f, live half):
    # read each artifact back from the S3 origin and confirm the served bytes
    # match what was just built and signed. Reads the origin (not CloudFront) so
    # the check is not confused by CDN caching; propagation is handled by the
    # invalidation below. Fails closed on any mismatch.
    - name: Post-publish round-trip verify
      working-directory: infrastructure
      run: |
        BUCKET_NAME=$(terraform output -raw s3_bucket_name)
        fail=0
        check() {
          want=$(sha256sum "$1" | awk '{print $1}')
          got=$(aws s3 cp "s3://$BUCKET_NAME/$2" - | sha256sum | awk '{print $1}')
          if [ "$want" != "$got" ]; then
            echo "::error::round-trip mismatch for $2 (built $want, served $got)"; fail=1
          else
            echo "ok: $2"
          fi
        }
        check ksi-signal.json .well-known/ksi-signal.json
        check opa-policy-bundle.tar.gz .well-known/opa-policy-bundle.tar.gz
        check oscal-ssp.json .well-known/oscal-ssp.json
        check vdr-report.json .well-known/vdr-report.json
        check oscal-poam.json .well-known/oscal-poam.json
        check ongoing-certification-report.json .well-known/ongoing-certification-report.json
        check certification-overview-package.json .well-known/certification-overview-package.json
        check availability.json .well-known/availability.json
        check policy-index.json .well-known/policy-index.json
        check security-decision-record.json .well-known/security-decision-record.json
        check certification-package-overview.json .well-known/certification-package-overview.json
        check iiw.csv .well-known/iiw.csv
        # SLSA/in-toto provenance attestations (S2/S3): served bytes match the build.
        for a in ksi-signal.json oscal-ssp.json oscal-poam.json vdr-report.json iiw.csv; do
          check "$a.intoto.jsonl" ".well-known/$a.intoto.jsonl"
        done
        if [ "$fail" -ne 0 ]; then
          echo "Post-publish round-trip FAILED — served artifacts do not match the build."; exit 1
        fi
        echo "✅ Round-trip verified: served origin matches the just-built artifacts"

    # -------------------------------------------------------------------------
    # REFRESH WEBSITE CACHE
    # -------------------------------------------------------------------------
    # Tell the CDN to show the new website immediately
    # -------------------------------------------------------------------------
    - name: Invalidate CloudFront Cache
      run: |
        echo "Getting CloudFront distribution ID..."
        cd infrastructure
        
        DISTRIBUTION_ID=$(terraform output -raw cloudfront_distribution_id 2>/dev/null || echo "")
        
        if [ -z "$DISTRIBUTION_ID" ]; then
          echo "❌ Could not get CloudFront distribution ID"
          echo "Available outputs:"
          terraform output 2>/dev/null || echo "No outputs available"
          exit 1
        fi
        
        echo "✅ CloudFront distribution ID: $DISTRIBUTION_ID"
        echo "Creating cache invalidation..."

        # Tell CDN to refresh all cached content. Capture the id + distribution so
        # the external-verifier smoke test can wait for this invalidation to
        # complete before checking the live edge.
        INVALIDATION_ID=$(aws cloudfront create-invalidation \
          --distribution-id $DISTRIBUTION_ID \
          --paths "/*" \
          --query 'Invalidation.Id' --output text)
        echo "CLOUDFRONT_DISTRIBUTION_ID=$DISTRIBUTION_ID" >> "$GITHUB_ENV"
        echo "CLOUDFRONT_INVALIDATION_ID=$INVALIDATION_ID" >> "$GITHUB_ENV"

        echo "✅ CloudFront cache invalidation created ($INVALIDATION_ID)"

    # -------------------------------------------------------------------------
    # RECIPROCITY HANDSHAKE: prove the EXTERNAL verification path still works
    # -------------------------------------------------------------------------
    # Run the same verifier a third party would (scripts/verify-published.sh)
    # against the LIVE public URL: fetch the artifacts, check the Sigstore
    # signatures + SLSA provenance against the pinned identity, and reconcile
    # them (AWS-free, invariants b–h). Waits for the invalidation above so the
    # edge is serving this deploy's artifacts. Fails closed: if an outsider could
    # not reproduce our verdict, the deploy is not done.
    - name: External verifier smoke test (reciprocity handshake)
      run: |
        echo "Waiting for CloudFront invalidation $CLOUDFRONT_INVALIDATION_ID to complete..."
        aws cloudfront wait invalidation-completed \
          --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
          --id "$CLOUDFRONT_INVALIDATION_ID"
        echo "Reproducing third-party verification against the live site:"
        bash scripts/verify-published.sh

    # -------------------------------------------------------------------------
    # VERIFY EVERYTHING WORKED
    # -------------------------------------------------------------------------
    # Run the monitoring function to make sure deployment was successful
    # -------------------------------------------------------------------------
    - name: Run Post-Deployment Compliance Check
      run: |
        echo "Debug: Current working directory"
        pwd
        echo "Debug: Directory contents before Lambda check"
        ls -la
        
        cd infrastructure
        
        LAMBDA_FUNCTION=$(terraform output -raw lambda_function_name 2>/dev/null || echo "")
        echo "Lambda function name: $LAMBDA_FUNCTION"
        
        cd ..
        
        # Test the monitoring function if it exists
        if [ -n "$LAMBDA_FUNCTION" ] && [ "$LAMBDA_FUNCTION" != "Not created" ]; then
          if aws lambda get-function --function-name $LAMBDA_FUNCTION >/dev/null 2>&1; then
            echo "✅ Lambda function exists, invoking..."
            aws lambda invoke \
              --function-name $LAMBDA_FUNCTION \
              --payload '{}' \
              compliance-result.json
            
            echo "Debug: Directory contents after Lambda invoke"
            ls -la
            
            if [ -f compliance-result.json ]; then
              echo "✅ compliance-result.json created successfully"
              echo "Compliance check results:"
              cat compliance-result.json | jq '.'
              
              COMPLIANT=$(cat compliance-result.json | jq -r '.body' | jq -r '.compliant // false')
              if [ "$COMPLIANT" = "true" ]; then
                echo "✅ Post-deployment compliance check passed"
              else
                echo "❌ Post-deployment compliance violations found"
                echo "::warning::Compliance violations detected in deployed infrastructure"
              fi
            else
              echo "❌ compliance-result.json was not created by Lambda invoke"
              echo '{"message":"Lambda invoke failed to create file","compliant":false}' > compliance-result.json
            fi
          else
            echo "⚠️ Lambda function not found in AWS, creating placeholder compliance result"
            echo '{"message":"Lambda function not found in AWS","compliant":true}' > compliance-result.json
          fi
        else
          echo "⚠️ Lambda function not available during initial deployment"
          echo '{"message":"Lambda function not available during initial deployment","compliant":true}' > compliance-result.json
        fi
        
        echo "Debug: Final directory contents"
        ls -la
        echo "Debug: Checking if compliance-result.json exists"
        if [ -f compliance-result.json ]; then
          echo "✅ compliance-result.json exists"
          cat compliance-result.json
        else
          echo "❌ compliance-result.json still missing"
        fi
  
    # Help debug file system issues
    - name: Debug - List files before upload
      if: always()
      run: |
        echo "Pre-upload debug:"
        pwd
        ls -la
        find . -name "*compliance*" -type f 2>/dev/null || echo "No compliance files found anywhere"
    
    # -------------------------------------------------------------------------
    # SAVE DEPLOYMENT SUMMARY
    # -------------------------------------------------------------------------
    - name: Save Deployment Outputs
      run: |
        cd infrastructure
        terraform output -json > ../deployment-outputs.json
        cd ..
        echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "| Output | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
        cd infrastructure
        echo "| S3 Bucket | $(terraform output -raw s3_bucket_name) |" >> $GITHUB_STEP_SUMMARY
        echo "| CloudFront Distribution | $(terraform output -raw cloudfront_distribution_id) |" >> $GITHUB_STEP_SUMMARY
        echo "| Website URL | $(terraform output -json website_urls | jq -r '.domain // .cloudfront') |" >> $GITHUB_STEP_SUMMARY
    
    # Keep compliance results for audit records
    - name: Upload Compliance Report
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always()
      with:
        name: compliance-report
        path: |
          compliance-result.json
          infrastructure/ksi-signal.json
          infrastructure/ksi-signal.bundle
          infrastructure/oscal-ssp.json
        retention-days: 30

  # ===========================================================================
  # JOB 3: EXTRA SECURITY SCANS
  # ===========================================================================
  # Runs additional security tools during code review to catch more issues
  # ===========================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    # Runs on both push and pull_request so the deploy job (which only runs on
    # push to main) can consume the SARIF output as a workflow artifact and
    # feed it to the VDR aggregator.

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    # Scan infrastructure code for security issues
    - name: Run tfsec
      uses: aquasecurity/tfsec-action@b466648d6e39e7c75324f25d83891162a721f2d6 # v1.0.3
      with:
        # Authenticate the action's "resolve latest tfsec release" GitHub API
        # call — anonymous requests get rate-limited on shared runners and the
        # step then dies with "jq: Cannot iterate over null" before scanning.
        github_token: ${{ secrets.GITHUB_TOKEN }}
        soft_fail: true
        additional_args: --format json --out tfsec-results.json

    # Another security scanner with different focus.
    # Newer versions of bridgecrewio/checkov-action treat output_file_path
    # as a directory and write the SARIF inside it (e.g. results/results_sarif.sarif).
    # We point it at a directory and locate the SARIF afterwards.
    - name: Run Checkov
      id: checkov
      uses: bridgecrewio/checkov-action@63fbdab56e22a18bbc16fdc5208c0d30a71f3a24 # v12.2937.0
      with:
        directory: .
        framework: terraform
        soft_fail: true
        output_format: sarif
        output_file_path: checkov-out

    # Locate the SARIF file Checkov produced and copy it to a predictable path.
    # Fall back to a minimal empty SARIF if the action produced nothing.
    - name: Locate or create SARIF and tfsec files
      if: always()
      run: |
        SARIF_FOUND=$(find checkov-out -name "*.sarif" -type f 2>/dev/null | head -n1 || true)
        if [ -n "$SARIF_FOUND" ]; then
          cp "$SARIF_FOUND" checkov-results.sarif
          echo "Located Checkov SARIF at $SARIF_FOUND, copied to checkov-results.sarif ($(wc -c < checkov-results.sarif) bytes)"
        else
          echo "No SARIF produced by Checkov; creating empty fallback..."
          cat > checkov-results.sarif << 'EOF'
        {
          "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
          "version": "2.1.0",
          "runs": [
            {
              "tool": {
                "driver": {
                  "name": "Checkov",
                  "version": "fallback"
                }
              },
              "results": []
            }
          ]
        }
        EOF
        fi
        if [ ! -f tfsec-results.json ]; then
          echo "Creating fallback tfsec JSON file..."
          echo '{"results": []}' > tfsec-results.json
        else
          echo "tfsec JSON size: $(wc -c < tfsec-results.json) bytes"
        fi

    # Upload results to GitHub Security tab
    - name: Upload Checkov Results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
      if: always()
      with:
        sarif_file: checkov-results.sarif

    # Share the SAST output with the deploy job so it can be ingested by the
    # VDR aggregator. The deploy job runs on push to main; the artifact is the
    # transport between the two jobs.
    - name: Upload SAST artifacts for VDR aggregation
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always()
      with:
        name: sast-results
        path: |
          checkov-results.sarif
          tfsec-results.json
        retention-days: 5

  # ===========================================================================
  # JOB 4: ALERT WHEN THINGS BREAK
  # ===========================================================================
  # Sends notifications and creates tickets when deployment fails
  # ===========================================================================
  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [compliance-check, deploy]
    if: always() && (needs.compliance-check.result == 'failure' || needs.deploy.result == 'failure')
    
    steps:
    # Create GitHub issue so failure doesn't get forgotten
    - name: Create Issue on Failure
      if: github.event_name == 'push'
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `Deployment Failed: ${context.workflow}`,
            body: `## Deployment Failure Report
            
            **Workflow**: ${context.workflow}
            **Run ID**: ${context.runId}
            **Commit**: ${context.sha}
            **Branch**: ${context.ref}
            
            The deployment failed during the compliance check or deployment phase.
            Please review the workflow logs and compliance reports.
            
            [View Workflow Run](${context.payload.repository.html_url}/actions/runs/${context.runId})`,
            labels: ['deployment', 'failure', 'urgent']
          })
