# Checkov configuration.
# =============================================================================
# Each suppression is tracked as a Risk-Accepted POA&M entry in docs/poam.md
# (POAM-003 through POAM-018, excluding POAM-016 which is an architectural
# decision not surfaced by Checkov). The rationale for each entry is in the
# corresponding POA&M item; this file's role is to make the suppression
# effective at scan-time so the published VDR report does not surface a
# finding that is already documented as accepted.
#
# Top-of-file `#checkov:skip=` annotations in main.tf do not work because
# Checkov requires inline annotations to be inside the relevant resource
# block. Centralized configuration avoids that placement constraint, and
# also covers checks that target resources we reference as `data` blocks
# rather than manage as `resource` blocks.
# =============================================================================

framework:
  - terraform

skip-check:
  # POAM-003 — S3 cross-region replication not configured (CP-9). Single-region static site.
  - CKV_AWS_144

  # POAM-004 — S3 event notifications not configured (AU-2). No event-driven workflow in scope.
  - CKV_AWS_23

  # POAM-005 CLOSED (Task 7) — the website bucket now has S3 server access logging
  # to a dedicated log bucket; CKV_AWS_18 passes there. The log bucket itself
  # carries a narrow inline skip (a log target can't log to itself), so the global
  # skip is removed.

  # POAM-006 CLOSED (Task 8b) — the website bucket now has a lifecycle config
  # (abort incomplete MPU + expire non-current versions); CKV_AWS_300 passes.

  # POAM-007 — CloudFront WAF not attached (SC-7, SI-4). Cost trade-off (~$120/year). Risk-adjusted to Low.
  - CKV_AWS_68

  # POAM-008 — Log4j-specific WAF rules not configured (SI-3). No Java runtime in scope.
  - CKV_AWS_174

  # POAM-009 — CloudFront origin failover not configured (CP-2, CP-7). Single S3 origin.
  - CKV_AWS_86

  # POAM-010 — Lambda VPC configuration absent (SC-7). Lambda has no internet egress, no sensitive data.
  - CKV_AWS_117

  # POAM-011 CLOSED (Task 6) — every Lambda environment block is now encrypted
  # with a customer-managed CMK (compliance Lambda → at_rest CMK; silk-reeling
  # Lambda → silk_reeling CMK). CKV_AWS_173 passes, so the skip is removed.

  # FALSE POSITIVE (was POAM-012, Task 8b) — reserved concurrency maps to SC-5
  # (DoS), but the compliance monitor is a daily EventBridge-triggered internal
  # function with no DoS exposure (SC-5 met at the boundary via CloudFront/API
  # Gateway throttling + Shield); the check is N/A here (and moot — the account is
  # hard-capped at 10 concurrency). See the False Positives register in poam.md.
  - CKV_AWS_115

  # POAM-013 CLOSED (Task 8b) — the compliance Lambda now has an SQS dead-letter
  # queue (dead_letter_config); CKV_AWS_116 passes.

  # POAM-014 — Lambda X-Ray tracing not enabled (AU-2). Observability concern, not security control.
  - CKV_AWS_50

  # FALSE POSITIVE (was POAM-015, Task 8b) — CKV_AWS_272 flags the absence of AWS
  # Signer specifically; no control mandates that one tool. SI-7/SA-12 software
  # integrity is met via the Sigstore source-signing chain (deploy-time KSI signal
  # Sigstore-signed + anchored in Rekor; Wasm policy bytes verify against the
  # canonical inventory hash) + the OIDC/GitOps chain of custody (no out-of-band
  # code path). See the False Positives register in poam.md.
  - CKV_AWS_272

  # POAM-017 CLOSED (Task 7) — every log group now has 365-day retention (AU-11);
  # CKV_AWS_338 passes on its own, so the skip is removed.

  # POAM-018 CLOSED (Task 6) — every CloudWatch log group is now encrypted with a
  # customer-managed CMK (compliance Lambda + route53 query logs → at_rest CMK;
  # silk-reeling → silk_reeling CMK). CKV_AWS_158 passes, so the skip is removed.

  # POAM-019 — Secrets Manager automatic rotation not enabled (SC-12, SC-28).
  # The two Silk Reeling app secrets are a third-party API key (Anthropic) and an
  # operator-set basic-auth credential; neither has a programmatic rotation
  # source. Rotated manually via put-secret-value; revisit annually. Low.
  - CKV2_AWS_57

  # POAM-022 — API Gateway HTTP API route specifies no authorizer (IA-2, AC-3).
  # Access control is enforced at the application layer (in-app HTTP Basic Auth),
  # which gates every request; a Gateway authorizer (JWT/IAM) is incompatible with
  # Basic Auth (both use the Authorization header), and the app must receive that
  # header unchanged. The API fronts a Lambda whose middleware rejects any request
  # without valid credentials. Risk-accepted.
  - CKV_AWS_309

  # POAM-024 CLOSED (Task 7) — the HTTP API stage now emits access logs to a
  # CMK-encrypted CloudWatch log group (with the required delivery resource
  # policy); CKV_AWS_76 passes on its own, so the skip is removed.
